async function renderTempDayPopup(d){
  const dayIdx=S.data.days.indexOf(d);
  const useHarm=d.useHarm;
  const forceIfs=!useHarm&&dayIdx<=3;
  const useWideBand=dayIdx<7;
  const hasEns=d.ensLoaded??false;
  const inRange=(val,lo,hi)=>val!=null&&lo!=null&&hi!=null&&val>=lo&&val<=hi;
  const useTMin=useHarm?d.harmTempMin!=null:(forceIfs||!hasEns||inRange(d.hresTempMin, useWideBand?d.tempMinP10:d.tempMinP25, useWideBand?d.tempMinP90:d.tempMinP75));
  const useTMax=useHarm?d.harmTempMax!=null:(forceIfs||!hasEns||inRange(d.hresTempMax, useWideBand?d.tempMaxP10:d.tempMaxP25, useWideBand?d.tempMaxP90:d.tempMaxP75));
  const tMin=useHarm?(d.harmTempMin??d.tempMinP50):(useTMin?d.hresTempMin:d.tempMinP50);
  const tMax=useHarm?(d.harmTempMax??d.tempMaxP50):(useTMax?d.hresTempMax:d.tempMaxP50);
  const bronLabel=useHarm?'HARMONIE':(forceIfs?'IFS':'IFS/ENS P50');
  const s='<sup style="font-size:calc(8px*var(--fz));opacity:.55">~</sup>';

  // Één gemeenschappelijke schaal voor beide balken zodat ze vergelijkbaar zijn
  const scaleMin=Math.min(d.tempMinP10??tMin,tMin)-2;
  const scaleMax=Math.max(d.tempMaxP90??tMax,tMax)+2;
  const scaleRng=Math.max(scaleMax-scaleMin,1);
  const pos=v=>Math.max(0,Math.min(100,(v-scaleMin)/scaleRng*100));
  const posMin=pos, posMax=pos;

  const minP10x=pos(d.tempMinP10??tMin), minP90x=pos(d.tempMinP90??tMin);
  const maxP10x=pos(d.tempMaxP10??tMax), maxP90x=pos(d.tempMaxP90??tMax);
  const tMinX=pos(tMin), tMaxX=pos(tMax);

  const dagBalk=`
    <div style="padding:14px 18px 10px">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Temperatuur · ENS spreiding + ${bronLabel}</div>
      <!-- Min temp balk -->
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--accent);margin-bottom:4px">${t('minTemp')}</div>
      <div style="position:relative;height:calc(18px*var(--fz));margin-bottom:2px">
        <span style="position:absolute;left:${tMinX}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--accent);font-weight:700;white-space:nowrap">${fmtTempShort(tMin)}${!useTMin?s:''}</span>
      </div>
      <div onclick="toggleTempDetail('tempMinDetail')" style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(12px*var(--fz));cursor:pointer">
        <div style="position:absolute;left:${minP10x}%;width:${Math.max(minP90x-minP10x,1)}%;height:100%;background:rgba(96,165,250,.2);border-radius:4px"></div>
        <div style="position:absolute;left:${posMin(d.tempMinP25??d.tempMinP10??tMin)}%;width:${Math.max(posMin(d.tempMinP75??d.tempMinP90??tMin)-posMin(d.tempMinP25??d.tempMinP10??tMin),1)}%;height:100%;background:rgba(96,165,250,.45);border-radius:4px"></div>
        <div style="position:absolute;left:calc(${posMin(d.tempMinP50??tMin)}% - 0.5px);width:1px;height:100%;background:rgba(96,165,250,.7)"></div>
        <div style="position:absolute;left:calc(${tMinX}% - 4px);top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--accent);border-radius:50%"></div>
      </div>
      <!-- Max temp balk -->
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--red);margin-bottom:4px">${t('maxTemp')}</div>
      <div style="position:relative;height:calc(18px*var(--fz));margin-bottom:2px">
        <span style="position:absolute;left:${tMaxX}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--red);font-weight:700;white-space:nowrap">${fmtTempShort(tMax)}${!useTMax?s:''}</span>
      </div>
      <div onclick="toggleTempDetail('tempMaxDetail')" style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(12px*var(--fz));cursor:pointer">
        <div style="position:absolute;left:${maxP10x}%;width:${Math.max(maxP90x-maxP10x,1)}%;height:100%;background:rgba(248,113,113,.2);border-radius:4px"></div>

          <span style="color:var(--muted)">P50: <span style="color:var(--accent);font-weight:700">${fmtTempShort(d.tempMinP50)}</span></span>

          <span style="color:var(--muted)">P10–P90: <span style="color:var(--accent)">${fmtTempShort(d.tempMinP10)}–${fmtTempShort(d.tempMinP90)}</span></span>
        </div>
      </div>
      <div id="tempMaxDetail" style="display:none;margin-top:10px;background:var(--surface2);border-radius:10px;padding:10px 14px">

          <span style="color:var(--muted)">P25–P75: <span style="color:var(--red)">${fmtTempShort(d.tempMaxP25)}–${fmtTempShort(d.tempMaxP75)}</span></span>
          <span style="color:var(--muted)">P10–P90: <span style="color:var(--red)">${fmtTempShort(d.tempMaxP10)}–${fmtTempShort(d.tempMaxP90)}</span></span>
        </div>
      </div>

    ?S.data.pastHours.filter(h=>h.time.slice(0,10)===d.date).map(h=>({...h,isPast:true}))
    :[];

  if(useHarm){
    forecastHours=harmHours.map(h=>({...h,isPast:false}));
  } else {

    if(!_dagUurCache[cacheKey]){
      const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?${base}&hourly=temperature_2m,weather_code&forecast_days=${Math.min(dayIdx+2,7)}`);
        if(r.ok){
          const j=await r.json();
          _dagUurCache[cacheKey]=(j.hourly?.time||[])
            .map((t,i)=>({time:t,hour:parseInt(t.slice(11,13)),
              temp:j.hourly.temperature_2m?.[i]!=null?Math.round(j.hourly.temperature_2m[i]):null,
              wmo:j.hourly.weather_code?.[i]??0,isPast:false}))
            .filter(h=>h.time.slice(0,10)===d.date);
        }
      }catch(e){console.warn('IFS temp uur mislukt:',e.message);}
    }
    forecastHours=_dagUurCache[cacheKey]||ifsHoursRaw.map(h=>({...h,isPast:false,temp:null}));
  }
  const dagHours=[...obsHours,...forecastHours];
  const bronUurLabel=useHarm?(dayIdx===0?'OBS + HARMONIE-AROME':'HARMONIE-AROME'):'IFS';

  // Lazy ENS uurlijkse P10/P50/P90 temperatuur (alleen niet-verleden uren)
  const ensTempCacheKey=_dagCacheKey(d.date,'ensHourTemp');
  if(!_dagUurCache[ensTempCacheKey]&&dayIdx<14){
    const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
    try{
      const ensDays=Math.min(dayIdx+2,16);
      const r=await fetch(`https://ensemble-api.open-meteo.com/v1/ensemble?${base}&hourly=temperature_2m&models=ecmwf_ifs025&forecast_days=${ensDays}`);

        const j=await r.json();
        const et=j.hourly?.time||[];
        const members=Object.keys(j.hourly||{}).filter(k=>k.startsWith('temperature_2m_member')).map(k=>j.hourly[k]);
        if(members.length){
          const pctile=(arr,p)=>{const s=[...arr].sort((a,b)=>a-b);const idx=(p/100)*(s.length-1);const lo=Math.floor(idx),hi=Math.ceil(idx);return lo===hi?s[lo]:s[lo]+(s[hi]-s[lo])*(idx-lo);};
          const map={};

          _dagUurCache[ensTempCacheKey]=map;
        }
      }
    }catch(e){console.warn('ENS uur temp mislukt:',e.message);}
  }
  const ensHourTempMap=_dagUurCache[ensTempCacheKey]||{};

  let uurHtml='';

// Lazy ENS uurdata per dag: wordt pas opgehaald bij klikken neerslag popup
const ensHourCache={};
async function getEnsForDay(date){
  if(ensHourCache[date]) return ensHourCache[date];
  // Haal ENS uurdata op voor alleen deze dag
  const lat=S.lat, lon=S.lon;
  const url=`https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${lat}&longitude=${lon}&hourly=precipitation&models=ecmwf_ifs025&start_date=${date}&end_date=${date}&timezone=auto`;
  try {
    const r=await fetch(url);
    if(!r.ok) return {};
    const j=await r.json();
    const en=j.hourly||{}, et=en.time||[];
    function getM(pfx){return Object.keys(en).filter(k=>k.startsWith(pfx+'_member')).map(k=>en[k]);}
    const PM=getM('precipitation');
    const PM2=PM.length?PM:[en.precipitation||[]];
    const result={};
    for(let i=0;i<et.length;i++){
      const pa=PM2.map(m=>m[i]??0).sort((a,b)=>a-b);
      result[et[i]]={
        pChance:Math.round(pge(pa,.1)),
        precipP10:r1(pct(pa,10)),
        precipP25:r1(pct(pa,25)),
        precipP50:r1(pct(pa,50)),
        precipP75:r1(pct(pa,75)),
        precipP90:r1(pct(pa,90)),
      };
    }
    ensHourCache[date]=result;
    return result;
  } catch(e){ console.warn('ENS uur ophalen mislukt:', e); return {}; }
}

// Gladde curve (zoals Chart.js tension) — Catmull-Rom/Bézier met gewogen afstand
function smoothPath(pts, t){
  if(!pts.length) return '';
  if(pts.length<2) return `M${pts[0].x},${pts[0].y}`;
  t=t==null?0.35:t;
  let d=`M${pts[0].x},${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i];
    const p1=pts[i];
    const p2=pts[i+1];
    const p3=pts[i+2]||p2;
    const d01=Math.hypot(p1.x-p0.x,p1.y-p0.y);
    const d12=Math.hypot(p2.x-p1.x,p2.y-p1.y);
    const d23=Math.hypot(p3.x-p2.x,p3.y-p2.y);
    let s12a=d12/(d01+d12); if(!isFinite(s12a))s12a=0;
    let s12b=d12/(d12+d23); if(!isFinite(s12b))s12b=0;
    const fb=t*s12a, fa=t*s12b;
    const c1x=p1.x+fb*(p2.x-p0.x), c1y=p1.y+fb*(p2.y-p0.y);
    const c2x=p2.x-fa*(p3.x-p1.x), c2y=p2.y-fa*(p3.y-p1.y);
    d+=` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2.x},${p2.y}`;
  }
  return d;
}

function buildLineGrafiek(dagHours, getValue, kleur, label, unit, bronLabel, getGust, getBand){
  if(!dagHours.length) return '';
  const vals=dagHours.map(getValue);
  const valid=vals.filter(v=>v!=null);
  if(!valid.length) return '';

  // Schaal inclusief gusts en ENS band
  const gustVals=getGust?dagHours.map(getGust).filter(v=>v!=null):[];
  const bandVals=getBand?dagHours.flatMap(h=>{const b=getBand(h);return b?[b.lo,b.hi]:[];}):[];
  const allVals=[...valid,...gustVals,...bandVals];
  const vmin=Math.min(...allVals), vmax=Math.max(...allVals);
  const range=Math.max(vmax-vmin,1);
  const pad=range*0.15;
  const lo=vmin-pad, hi=vmax+pad, rng=hi-lo;
  const W=280, H=70;
  const x=(i)=>Math.round(i/(dagHours.length-1||1)*W);
  const y=(v)=>Math.round(H-(v-lo)/rng*H);

  const ptArr=dagHours.map((h,i)=>{
    const v=getValue(h);
    return v!=null?{x:x(i),y:y(v)}:null;
  }).filter(Boolean);
  const pathD=smoothPath(ptArr,0.35);

  const firstFuture=dagHours.findIndex(h=>!h.isPast);
  const splitX=firstFuture>0?x(firstFuture):0;
  const grafId='grafiek_'+Math.random().toString(36).slice(2,7);
  const tooltipId='tooltip_'+grafId;

  // Klikbare stippen
  const stippen=dagHours.map((h,i)=>{
    const v=getValue(h);
    if(v==null) return '';
    const gust=getGust?getGust(h):null;
    const gustStr=gust!=null?` stoten:${gust}${unit}`:'';
    return`<circle cx="${x(i)}" cy="${y(v)}" r="5" fill="transparent" stroke="transparent"
      onclick="showGrafiekTooltip('${tooltipId}','${h.time.slice(11,16)}',${v},'${unit}','${kleur}'${gust!=null?`,${gust}`:',null'})"
      style="cursor:pointer"/>
    <circle cx="${x(i)}" cy="${y(v)}" r="2.5" fill="${kleur}" opacity="${h.isPast?0.4:1}" pointer-events="none"/>`;
  }).join('');

  // Gust stippen (driehoekjes boven de lijn)
  const gustStippen=getGust?dagHours.map((h,i)=>{
    const g=getGust(h);
    if(g==null) return '';
    return`<circle cx="${x(i)}" cy="${y(g)}" r="3" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.6)" stroke-width="1.5" pointer-events="none"/>
    <line x1="${x(i)}" y1="${y(g)}" x2="${x(i)}" y2="${y(getValue(h)??g)}" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-dasharray="2,2" pointer-events="none"/>`;
  }).join(''):'';

  return`<div style="padding:0 18px 10px;border-bottom:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase">${label} per uur · ${bronLabel}</div>
      ${getGust?`<div style="font-family:var(--mono);font-size:calc(9px*var(--fz));color:var(--muted)">○ stoten</div>`:''}
    </div>
    <svg id="${grafId}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;aspect-ratio:${W}/${H};display:block;overflow:visible">
      ${firstFuture>0?`<rect x="0" y="0" width="${splitX}" height="${H}" fill="rgba(255,255,255,.02)"/>`:``}
      ${(()=>{
        if(!getBand) return '';
        const bpts=dagHours.map((h,i)=>{const b=getBand(h);return b?{i,lo:b.lo,hi:b.hi}:null;}).filter(Boolean);
        if(bpts.length<2) return '';
        const top=bpts.map(p=>`${x(p.i)},${y(p.hi)}`).join('L');
        const bot=[...bpts].reverse().map(p=>`${x(p.i)},${y(p.lo)}`).join('L');
        return`<path d="M${top}L${bot}Z" fill="${kleur}" opacity="0.15" pointer-events="none"/>`;
      })()}
      <path d="${pathD}" fill="none" stroke="${kleur}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      ${gustStippen}
      ${stippen}
    </svg>
    <div id="${tooltipId}" style="display:none;margin-top:4px;background:var(--surface2);border-radius:8px;padding:7px 12px;font-family:var(--mono);font-size:calc(12px*var(--fz))"></div>
    <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:calc(9px*var(--fz));color:var(--muted);margin-top:2px">
      <span>${dagHours[0]?.time.slice(11,16)}</span>
      <span style="color:${kleur}">${Math.round(vmin)}–${Math.round(vmax)} ${unit}</span>
      <span>${dagHours[dagHours.length-1]?.time.slice(11,16)}</span>
    </div>
  </div>`;
}

// Berekent hoeveel minuten de zon boven de horizon is in een gegeven uur (0-60)
// timeStr: lokale tijd "YYYY-MM-DDTHH:MM", lat: breedtegraad
function sunMinutesInHour(timeStr, lat){
  const date = timeStr.slice(0,10);
  const localHour = parseInt(timeStr.slice(11,13));
  const utcOffsetH = (typeof S!=='undefined'&&S._utcOffset!=null)?S._utcOffset/3600:0;
  const utcHourStart = ((localHour - utcOffsetH) % 24 + 24) % 24;
  const utcHourEnd = utcHourStart + 1;
  const {rise, set} = getSunriseSunset(date, lat);
  // Overlap van [utcHourStart, utcHourEnd] met [rise, set]
  const overlapStart = Math.max(utcHourStart, rise);
  const overlapEnd = Math.min(utcHourEnd, set);
  const overlapH = Math.max(0, overlapEnd - overlapStart);
  return Math.round(overlapH * 60); // in minuten (0-60)
}

function getSunriseSunset(dateStr, lat){
  const d=new Date(dateStr+'T12:00:00Z');
  const doy=Math.floor((d-new Date(Date.UTC(d.getUTCFullYear(),0,0)))/(864e5));
  const phi=lat*Math.PI/180;
  const delta=0.409*Math.sin(2*Math.PI/365*doy-1.39);
  const cosH0=-Math.tan(phi)*Math.tan(delta);
  if(cosH0<=-1)return{rise:0,set:24};  // middernachtzon
  if(cosH0>=1)return{rise:12,set:12};  // poolnacht
  const H0=Math.acos(cosH0)*12/Math.PI;
  return{rise:12-H0, set:12+H0};
}
function isHourDay(timeStr, lat){
  const date=timeStr.slice(0,10);
  const localHour=parseInt(timeStr.slice(11,13))+parseInt(timeStr.slice(14,16)||'0')/60;
  // Tijden van Open-Meteo zijn lokale tijd; getSunriseSunset rekent in UTC
  const utcOffsetH=(typeof S!=='undefined'&&S._utcOffset!=null)?S._utcOffset/3600:0;
  const utcHour=((localHour-utcOffsetH)%24+24)%24;
  const {rise,set}=getSunriseSunset(date, lat);
  return utcHour>=rise&&utcHour<set?1:0;
}

function _daylightHours(dateStr, lat){
  const d=new Date(dateStr+'T12:00:00');
  const doy=Math.floor((d-new Date(d.getFullYear(),0,0))/(1000*60*60*24));
  const phi=lat*Math.PI/180;
  const delta=0.409*Math.sin(2*Math.PI/365*doy-1.39);
  const cosH0=-Math.tan(phi)*Math.tan(delta);
  if(cosH0<=-1)return 24;
  if(cosH0>=1)return 0;
  return 2*Math.acos(cosH0)*12/Math.PI;
}

      const useTMax=useHarm?d.harmTempMax!=null:(forceIfs||!hasEns||inRange(d.hresTempMax, useWideBand?d.tempMaxP10:d.tempMaxP25, useWideBand?d.tempMaxP90:d.tempMaxP75));

      const forceIfs=!useHarm&&dayIdx<=3; // dag 2-3: altijd IFS
      const inRange=(val,lo,hi)=>val!=null&&lo!=null&&hi!=null&&val>=lo&&val<=hi;

          </div>

    }else if(dTab==='wind'){
      const useHarm=d.useHarm;
      const forceIfs=!useHarm&&dayIdx<=3;
      const inRange=(val,lo,hi)=>val!=null&&lo!=null&&hi!=null&&val>=lo&&val<=hi;
  const useWideBand=dayIdx<7;
  const hasEns=d.ensLoaded??false;
      const useWind=useHarm?d.harmWindMax!=null:(forceIfs||!hasEns||inRange(d.hresWindMax, useWideBand?d.windP10:d.windP25, useWideBand?d.windP90:d.windP75));

      const windDir=d.hresWindDir??d.windDir;
      const p10=d.windP10, p50=d.windP50, p90=d.windP90;
      const allP10=S.data.days.map(day=>day.windP10);
      const allP90=S.data.days.map(day=>day.windP90);
      const scaleMin=Math.max(0,Math.min(...allP10)-5);
      const scaleMax=Math.max(...allP90)+5;

      midHtml=`<div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;min-width:0">
            <div style="position:relative;height:6px;background:rgba(128,128,128,.13);border-radius:3px">
              <div style="position:absolute;left:${p10x}%;width:${rangeW}%;height:100%;background:rgba(128,128,128,.25);border-radius:3px"></div>
              <div style="position:absolute;left:calc(${p50x}% - 0.5px);width:1px;height:100%;background:rgba(128,128,128,.7)"></div>
              <div style="position:absolute;left:calc(${valX}% - 2px);width:4px;height:100%;background:var(--muted);border-radius:2px"></div>
            </div>
            <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--muted);margin-top:4px;text-align:center">${hasEns?fmtWind(p10)+'–'+fmtWind(p90):'—'}</div>
          </div>
        </div>`;
      rightHtml=`<span style="display:flex;align-items:center;gap:4px;white-space:nowrap;flex-shrink:0">${degToArrow(windDir)}<span class="day-right-val">${fmtWind(windVal)}${s}</span></span>`;

    }else{ // zon
      const maxSun=r1(_daylightHours(d.date, S.lat));
      const sh=d.sunHours??0;
      const pct=Math.min(sh/maxSun*100,100);
      const et0=d.et0??null;
      const allEt0=S.data.days.map(day=>day.et0??0);
      const et0Max=Math.max(...allEt0,4)+1;
      const et0Pct=et0!=null?Math.min(et0/et0Max*100,100):0;
      midHtml=`
        <div style="margin-bottom:6px">
          <div class="day-bar-wrap"><div class="day-bar-fill" style="left:0;width:${pct}%;background:var(--amber)"></div></div>
        </div>
        <div>
          <div class="day-bar-wrap"><div class="day-bar-fill" style="left:0;width:${et0Pct}%;background:rgba(52,199,89,.7)"></div></div>

      <div class="day-mid">${midHtml}</div>
      ${rightHtml?`<div class="day-right">${rightHtml}</div>`:''}
    </div>`;
  };

  const first7Html = S.data.days.slice(0,7).map(mapRow).join('');
  // Dag 8+ zijn altijd via lazy-load bereikbaar (IFS 16d / ENS 14d)
  const hasExt = true;
  const isOpen = S._extDaysOpen;
  const extLoaded = S.data.days.length > 7;
  const ext7Html = extLoaded
    ? S.data.days.slice(7).map(mapRow).join('')
    : `<div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:18px 16px;font-family:var(--mono);font-size:calc(12px*var(--fz));color:var(--muted)"><span class="spinner"></span> ${t('dataLoading')}</div>`;

  const toggleRow = hasExt ? `<div id="extDaysToggle"

    </div>` : '';

  const extSection = hasExt
    ? `<div id="extDaysSection" style="display:${isOpen?'block':'none'}">${ext7Html}</div>`
    : '';

  document.getElementById('dailyList').innerHTML = first7Html + toggleRow + extSection;
}

async function loadIfsSunFull(){
  if(S._ifsSunFullLoaded) return;
  S._ifsSunFullLoaded=true; // direct zetten om dubbele calls te voorkomen
  const base=S._ensBase||`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
  const hresUrl16=`https://api.open-meteo.com/v1/ecmwf?${base}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,winddirection_10m_dominant,weather_code,dewpoint_2m_max,dewpoint_2m_min,sunshine_duration,et0_fao_evapotranspiration&forecast_days=16`;
  try{
    const iR=await fetch(hresUrl16);
    if(iR.ok){ const j=await iR.json(); if(!j?.error){ S._ifsJ=j; S._sJ=j; } }
    S.data=processAll(S._oJ,S._hJ,S._eJ,S._sJ,S._ifsJ,null);
    if(reapplyAgroStation()){ render(); renderHourly(); }
    renderDaily();
    updateDailyTitle();
  }catch(e){ S._ifsSunFullLoaded=false; console.warn('IFS/Sun 16d laden mislukt:',e.message); }
}

async function loadEnsFullData(){
  if(S._ensFullLoaded) return;
  const base=S._ensBase||`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
  const url=`https://ensemble-api.open-meteo.com/v1/ensemble?${base}&daily=precipitation_sum,temperature_2m_max,temperature_2m_min,windspeed_10m_max&models=ecmwf_ifs025&forecast_days=14`;
  try{
    const r=await fetch(url);
    if(!r.ok) return;
    S._eJ=await r.json();
    S._ensFullLoaded=true;
    S.data=processAll(S._oJ,S._hJ,S._eJ,S._sJ,S._ifsJ,null);
    if(reapplyAgroStation()){ render(); renderHourly(); }
    renderDaily();
    updateDailyTitle();
  }catch(e){ console.warn('ENS volledig laden mislukt:',e.message); }
}

function toggleExtDays(){
  S._extDaysOpen=!S._extDaysOpen;
  renderDaily();
  if(S._extDaysOpen){
    if(!S._ensFullLoaded) loadEnsFullData().catch(e=>console.warn(e));
    if(!S._ifsSunFullLoaded) loadIfsSunFull().catch(e=>console.warn(e));
  }
}

function renderSpread(){
  if(S.chart){S.chart.destroy();S.chart=null;}
  const DAYS=tDays(),days=S.data.days;
  const labels=days.map(d=>DAYS[new Date(d.date+'T12:00:00').getDay()]);
  const dark=matchMedia('(prefers-color-scheme:dark)').matches;
  const tick=dark?'rgba(255,255,255,.38)':'rgba(0,0,0,.38)';
  const grid=dark?'rgba(255,255,255,.05)':'rgba(0,0,0,.05)';
  S.chart=new Chart(document.getElementById('spreadChart').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'P10–P90',data:labels.map((_,i)=>[days[i].precipP10,days[i].precipP90]),backgroundColor:'rgba(48,209,88,.18)',borderColor:'rgba(48,209,88,.45)',borderWidth:.5,borderSkipped:false},
      {label:'P25–P75',data:labels.map((_,i)=>[days[i].precipP25,days[i].precipP75]),backgroundColor:'rgba(96,165,250,.28)',borderColor:'rgba(96,165,250,.55)',borderWidth:.5,borderSkipped:false},
      {label:'Mediaan',data:days.map(d=>d.precipMedian),type:'line',borderColor:'var(--accent)',backgroundColor:'transparent',borderWidth:2,pointRadius:4,pointBackgroundColor:dark?'#1c1c1e':'#fff',pointBorderColor:'var(--accent)',pointBorderWidth:2,tension:.35,order:0},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{
        if(Array.isArray(c.raw))return`${c.dataset.label}: ${c.raw[0]}–${c.raw[1]} mm`;
        return`${c.dataset.label}: ${c.raw} mm`;
      }}}},
      scales:{x:{grid:{display:false},ticks:{color:tick}},
        y:{title:{display:true,text:'mm/dag',color:tick,font:{size:10}},ticks:{color:tick},grid:{color:grid},min:0}}}
  });
}

function renderRisk(){
  const fh=S.data.futureHours, d0=S.data.days[0];
  const totalP50=r1(fh.reduce((s,h)=>s+(h.precip||0),0));
  const maxP10mm=fh.length?Math.max(...fh.map(h=>h.p10mm??0)):0;
  const peakHour=fh.find(h=>(h.p10mm??0)===maxP10mm)?.time.slice(11,16)||'—';
  const maxChance=fh.length?Math.max(...fh.map(h=>h.pChance??0)):0;
  const peakChanceHour=fh.find(h=>(h.pChance??0)===maxChance)?.time.slice(11,16)||'—';
  const spread=r1((d0?.precipP90??0)-(d0?.precipP10??0));
  document.getElementById('riskGrid').innerHTML=[
    {title:'Max. neerslagkans (24u)',val:maxChance+'%',sub:`piek om ${peakChanceHour}`,color:'var(--accent)'},
    {title:'Kans op piekbui ≥ 10 mm',val:maxP10mm+'%',sub:`hoogste uur om ${peakHour}`,color:maxP10mm>=20?'var(--red)':'var(--amber)'},
    {title:'Verwachte neerslag (P50)',val:totalP50+' mm',sub:`${(S.harmDisabled||S.harmFailed)?'IFS':'HARMONIE'} mediaan · 24u`,color:'var(--green)'},
    {title:'Dagspanning (P10–P90)',val:spread+' mm',sub:`${d0?.precipP10??0}–${d0?.precipP90??0} mm vandaag`,color:'#a78bfa'},  ].map(r=>`<div class="risk-card"><div class="risk-card-title">${r.title}</div><div class="risk-card-val" style="color:${r.color}">${r.val}</div><div class="risk-card-sub">${r.sub}</div></div>`).join('');
}

/* ── Pull-to-refresh ──────────────────────────────────────────── */
(function(){
  const THRESHOLD=70;
  let startY=0,pulling=false,triggered=false;
  const ind=document.getElementById('pullIndicator');
  const pullText=document.getElementById('pullText');
  const pullSpinner=document.getElementById('pullSpinner');
  if(!ind) return;

  function overlaysOpen(){
    return['searchOverlay','settingsOverlay','hourlyOverlay','dayOverlay'].some(id=>{const el=document.getElementById(id);return el&&el.style.display!=='none';});
  }

  document.addEventListener('touchstart',e=>{
    if(overlaysOpen()||window.scrollY>5) return;
    startY=e.touches[0].clientY;
    pulling=true;
    triggered=false;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!pulling) return;
    const dy=e.touches[0].clientY-startY;
    if(dy<=0){ pulling=false; return; }
    const progress=Math.min(dy/THRESHOLD,1);
    if(dy>10){
      ind.style.display='flex';
      ind.style.opacity=String(Math.min(progress*1.5,1));
      pullText.textContent=dy>=THRESHOLD?'↑ Loslaten om te verversen':'↓ Trek omlaag om te verversen';
    }
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!pulling) return;
    const dy=e.changedTouches[0].clientY-startY;
    pulling=false;
    if(dy>=THRESHOLD&&!triggered){
      triggered=true;
      pullText.textContent='Verversen…';
      pullSpinner.style.display='inline-block';
      ind.style.opacity='1';
      run().catch(err=>console.warn('Pull-refresh fout:',err)).finally(()=>{
        setTimeout(()=>{ ind.style.display='none'; pullSpinner.style.display='none'; triggered=false; },800);
      });
    } else {
      ind.style.display='none';
    }
  },{passive:true});
})();

/* ── Eenheden conversie ────────────────────────────────────────── */
// Temperatuur: input altijd °C (integer of null)
function fmtTemp(c){
  if(c==null||c==='—')return'—';
  const v=Number(c);
  if(PREFS.tempUnit==='F')return Math.round(v*9/5+32)+'°F';
  if(PREFS.tempUnit==='K')return Math.round(v+273.15)+' K';
  return Math.round(v)+'°C';
}
function fmtTempShort(c){
  // Gebruik ° zonder eenheidsletter voor compacte weergave
  if(c==null||c==='—')return'—';
  const v=Number(c);
  if(PREFS.tempUnit==='F')return Math.round(v*9/5+32)+'°';
  if(PREFS.tempUnit==='K')return Math.round(v+273.15)+'';
  return Math.round(v)+'°';
}
function tempUnit(){
  if(PREFS.tempUnit==='F')return '°F';
  if(PREFS.tempUnit==='K')return 'K';
  return '°C';
}
// Numerieke conversie (zonder eenheidslabel) voor grafieken/assen
function convTempVal(c){
  if(c==null)return null;
  const v=Number(c);
  if(PREFS.tempUnit==='F')return Math.round(v*9/5+32);
  if(PREFS.tempUnit==='K')return Math.round(v+273.15);
  return Math.round(v);
}
function convWindVal(kmh){
  if(kmh==null)return null;
  const v=Number(kmh);
  if(PREFS.windUnit==='ms')return Math.round(v/3.6);
  if(PREFS.windUnit==='kn')return Math.round(v*0.54);
  if(PREFS.windUnit==='bft'){const bs=[0,1,6,12,20,29,39,50,62,75,89,103,118];const b=bs.findIndex(t=>v<t)-1;return b<0?12:Math.max(0,b);}
  return Math.round(v);
}

// Wind: input altijd km/u (integer of null)
function fmtWind(kmh){
  if(kmh==null||kmh==='—')return'—';
  const v=Number(kmh);
  if(PREFS.windUnit==='ms')return Math.round(v/3.6)+' m/s';
  if(PREFS.windUnit==='kn')return Math.round(v*0.5400)+' kn';
  if(PREFS.windUnit==='bft'){
    const bs=[0,1,6,12,20,29,39,50,62,75,89,103,118];
    const b=bs.findIndex(t=>v<t)-1;
    return 'Bft '+(b<0?12:Math.max(0,b));
  }
  return Math.round(v)+' km/u';
}
function windUnit(){
  if(PREFS.windUnit==='ms')return 'm/s';
  if(PREFS.windUnit==='kn')return 'kn';
  if(PREFS.windUnit==='bft')return 'Bft';
  return 'km/u';
}
// Druk: input altijd hPa
function fmtPres(hpa){
  if(hpa==null||hpa==='—')return'—';
  const v=Number(hpa);
  if(PREFS.presUnit==='mbar')return Math.round(v)+' mbar';
  if(PREFS.presUnit==='inHg')return(v*0.02953).toFixed(2)+' inHg';
  return Math.round(v)+' hPa';
}

/* ── Settings modal bouwen ────────────────────────────────────── */
/* ══════════════════════════════════════════════════════════════════
   AGROEXACT INTEGRATIE (REST API)
   Verbindt met de AgroExact API (app.agroexact.com/api/v2) met een
   API-token. Zoekt het dichtstbijzijnde station; binnen 10 km wordt de
   actuele meting + afgelopen uren gebruikt i.p.v. Open-Meteo.
   NB: vereist dat de API CORS toestaat vanuit de browser. Endpoint-paden
   staan als constanten hieronder en zijn eenvoudig aan te passen.
   ══════════════════════════════════════════════════════════════════ */
const AGRO={stations:null, status:'idle', nearest:null, error:null, data:null};
// ── Configuratie ──────────────────────────────────────────────
// Pas deze aan als de AgroExact API andere paden/headers gebruikt.
const AGRO_DEFAULT_BASE='https://app.agroexact.com/api/v2';
const AGRO_STATIONS_KEY='weer_agro_stations_v1';
// Endpoint-paden volgens AgroExact API v2 (base = .../api/v2)
const AGRO_EP_STATIONS='/stations/';
const AGRO_EP_READINGS=(id,hours)=>`/readings/${id}/?hours=${hours}`;
function agroBaseUrl(){
  return (PREFS.agroBase||AGRO_DEFAULT_BASE).replace(/\/+$/,'');
}
function agroAuthHeaders(){
  const tok=(PREFS.agroToken||'').trim();
  const h={'Accept':'application/json'};
  if(tok){
    // AgroExact verwacht: Authorization: Token <api_key>
    // Als de token al een prefix (Token/Bearer) bevat, niet dubbel toevoegen
    h['Authorization']=/^(token|bearer)\s/i.test(tok)?tok:('Token '+tok);
  }
  return h;
}

// Generieke GET naar de AgroExact REST API
async function agroApiGet(path){
  let resp;
  try{
    resp=await fetch(agroBaseUrl()+path,{method:'GET',headers:agroAuthHeaders()});
  }catch(e){
    throw new Error('Netwerk/CORS: '+e.message);
  }
  if(!resp.ok){
    let detail='';
    try{const j=await resp.json(); detail=j?.message||j?.detail||j?.error||'';}catch{}
    throw new Error('HTTP '+resp.status+(detail?' · '+detail:''));
  }
  return resp.json();
}

// Haal een array van records uit een respons (tolerant voor verschillende vormen)
function agroRecords(json){
  if(Array.isArray(json)) return json;
  if(json && Array.isArray(json.records)) return json.records;
  if(json && Array.isArray(json.data)) return json.data;
  if(json && Array.isArray(json.results)) return json.results;
  if(json && Array.isArray(json.stations)) return json.stations;
  if(json && Array.isArray(json.readings)) return json.readings;
  return [];
}
// Tolerante veld-helpers (verschillende mogelijke veldnamen)
const _f=(o,...keys)=>{for(const k of keys){if(o[k]!=null)return o[k];}return null;};

// Haal stationlijst op (met cache in localStorage)
async function agroLoadStations(force){
  if(AGRO.stations && !force) return AGRO.stations;
  if(!force){
    try{
      const cached=JSON.parse(localStorage.getItem(AGRO_STATIONS_KEY));
      if(cached && cached.ts && (Date.now()-cached.ts)<7*864e5 && Array.isArray(cached.stations) && cached.base===agroBaseUrl()){
        AGRO.stations=cached.stations; return AGRO.stations;
      }
    }catch{}
  }
  const json=await agroApiGet(AGRO_EP_STATIONS);
  const stations=agroRecords(json)
    .map(r=>({
      id:_f(r,'station_id','id','stationId','uuid'),
      name:_f(r,'name','station_name','label')||'Station',
      lat:parseFloat(_f(r,'latitude','lat')),
      lon:parseFloat(_f(r,'longitude','lon','lng')),
      type:_f(r,'version_type','type','kind'),
    }))
    .filter(s=>s.id && isFinite(s.lat) && isFinite(s.lon))
    // Alleen volledige weerstations (ATMO); als type ontbreekt, toch meenemen
    .filter(s=>!s.type || /atmo/i.test(s.type));
  if(!stations.length) throw new Error('Geen stations in respons');
  AGRO.stations=stations;
  try{localStorage.setItem(AGRO_STATIONS_KEY,JSON.stringify({ts:Date.now(),base:agroBaseUrl(),stations}));}catch{}
  return stations;
}

// Vind dichtstbijzijnde station bij lat/lon
async function agroNearestStation(lat,lon){
  const stations=await agroLoadStations(false);
  let best=null, bestD=Infinity;
  for(const s of stations){
    const d=agroDistKm(lat,lon,s.lat,s.lon);
    if(d<bestD){bestD=d; best=s;}
  }
  return best?{...best, dist:bestD}:null;
}

// Haal ~30u readings op en bouw uur-data + huidige meting
async function agroFetchStationData(stationId, offsetSec){
  const json=await agroApiGet(AGRO_EP_READINGS(stationId,30));
  const recs=agroRecords(json).filter(r=>_f(r,'timestamp','time','datetime'));
  if(!recs.length) return null;
  // Sorteer nieuw→oud
  const ts=r=>_f(r,'timestamp','time','datetime');
  recs.sort((a,b)=>ts(a)<ts(b)?1:-1);

  const off=offsetSec||0;
  const pad=n=>String(n).padStart(2,'0');
  const localHourKey=(utcIso)=>{
    const d=new Date(utcIso);
    const l=new Date(d.getTime()+off*1000);
    return `${l.getUTCFullYear()}-${pad(l.getUTCMonth()+1)}-${pad(l.getUTCDate())}T${pad(l.getUTCHours())}:00`;
  };
  const kmh=v=>v==null?null:v*3.6;
  // Tolerante veld-extractie uit een reading
  const rTemp=r=>_f(r,'temperature_150','temperature_2m','temperature','temp');
  const rHum =r=>_f(r,'humidity_150','relativehumidity','humidity','rh');
  const rWind=r=>_f(r,'windspeed','wind_speed','wind');
  const rGust=r=>_f(r,'gust','windgust','wind_gust','gusts');
  const rDir =r=>_f(r,'wind_direction','winddirection','wind_dir');
  const rDew =r=>_f(r,'dewpoint','dew_point');
  const rPrec=r=>_f(r,'precipitation','precip','rain');

  // Groepeer per lokaal uur
  const byHour={};
  for(const r of recs){
    const k=localHourKey(ts(r));
    (byHour[k]=byHour[k]||[]).push(r);
  }
  const mean=arr=>arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:null;
  const circMean=degs=>{
    if(!degs.length)return null;
    let x=0,y=0; for(const d of degs){x+=Math.cos(d*Math.PI/180);y+=Math.sin(d*Math.PI/180);}
    let a=Math.atan2(y/degs.length,x/degs.length)*180/Math.PI; return (a+360)%360;
  };
  const hourKeys=Object.keys(byHour).sort(); // oud→nieuw
  const wmoFromOpenMeteo={};
  // Map bestaande wmo per uur uit huidige pastHours (zelfde locatie/uur) voor iconen
  (S.data?.pastHours||[]).forEach(h=>{ wmoFromOpenMeteo[h.time]=h.wmo; });

  const stationHours=hourKeys.map(k=>{
    const arr=byHour[k];
    const temps=arr.map(rTemp).filter(v=>v!=null).map(Number);
    const hums=arr.map(rHum).filter(v=>v!=null).map(Number);
    const winds=arr.map(rWind).filter(v=>v!=null).map(Number);
    const gusts=arr.map(rGust).filter(v=>v!=null).map(Number);
    const dews=arr.map(rDew).filter(v=>v!=null).map(Number);
    const dirs=arr.map(rDir).filter(v=>v!=null).map(Number);
    const precSum=arr.reduce((s,r)=>s+(Number(rPrec(r))||0),0);
    return {
      time:k,
      temp:temps.length?Math.round(mean(temps)):null,
      humidity:hums.length?Math.round(mean(hums)):null,
      wind:winds.length?Math.round(kmh(mean(winds))):null,
      gusts:gusts.length?Math.round(kmh(Math.max(...gusts))):null,
      windDir:dirs.length?Math.round(circMean(dirs)):null,
      dewpoint:dews.length?Math.round(mean(dews)):null,
      precip:r1(precSum),
      wmo:wmoFromOpenMeteo[k]??0,
      isDay:isHourDay(k,S.lat),
      isPast:true,
      _agro:true,
    };
  });

  // Huidige meting = nieuwste reading
  const cur=recs[0];
  const num=v=>v!=null?Number(v):null;
  const stationCurrent={
    time:localHourKey(ts(cur)),
    measTime:ts(cur),
    temp:rTemp(cur)!=null?Math.round(num(rTemp(cur))):null,
    humidity:rHum(cur)!=null?Math.round(num(rHum(cur))):null,
    wind:rWind(cur)!=null?Math.round(kmh(num(rWind(cur)))):null,
    gusts:rGust(cur)!=null?Math.round(kmh(num(rGust(cur)))):null,
    windDir:rDir(cur)!=null?Math.round(num(rDir(cur))):null,
    dewpoint:rDew(cur)!=null?Math.round(num(rDew(cur))):null,
    precip:r1(num(rPrec(cur))??0),
    wmo:(S.data?.futureHours?.[0]?.wmo)??(stationHours[stationHours.length-1]?.wmo)??0,
    isDay:isHourDay(localHourKey(ts(cur)),S.lat),
  };

  return {stationHours, stationCurrent};
}

// Pas gecachte stationdata opnieuw toe op S.data (zonder API-call)
function reapplyAgroStation(){
  if(!PREFS.agroExact || !S.data || !AGRO.data) return false;
  const {stationHours, stationCurrent, name, dist}=AGRO.data;
  const last12=stationHours.slice(-12);
  S.data.pastHours=last12;
  S.data.stationCurrent=stationCurrent;
  S.data.allHours=[...last12,...S.data.futureHours];
  S.data._agro={name, dist};
  return true;
}

// Hoofdfunctie: zoek station, haal data op, cache, pas toe
async function applyAgroStation(offsetSec){
  if(!PREFS.agroExact || !S.data) return;
  try{
    AGRO.status='searching'; AGRO.error=null; AGRO.data=null; updateAgroSettingsUI();
    const near=await agroNearestStation(S.lat,S.lon);
    AGRO.nearest=near;
    if(!near || near.dist>10){
      AGRO.status=near?'too_far':'none';
      S.data._agro=null; S.data.stationCurrent=null; updateAgroSettingsUI();
      try{render();}catch{}
      return;
    }
    AGRO.status='loading'; updateAgroSettingsUI();
    const sd=await agroFetchStationData(near.id, offsetSec);
    if(!sd){ AGRO.status='error'; AGRO.error='Geen metingen'; updateAgroSettingsUI(); return; }
    AGRO.data={stationHours:sd.stationHours, stationCurrent:sd.stationCurrent, name:near.name, dist:near.dist};
    reapplyAgroStation();
    AGRO.status='connected'; updateAgroSettingsUI();
    try{render();}catch(e){console.warn(e);}
    try{renderHourly();}catch{}
    try{renderDaily();}catch{}
  }catch(e){
    AGRO.status='error'; AGRO.error=e.message;
    S.data._agro=null;
    updateAgroSettingsUI();
    try{render();}catch{}
    console.warn('AgroExact:',e.message);
  }
}

// Verbind/ontkoppel via instellingen
function setAgroToken(v){ PREFS.agroToken=(v||'').trim(); savePrefs(); }
function setAgroBase(v){ PREFS.agroBase=(v||'').trim(); savePrefs(); }

async function toggleAgroExact(){
  if(!PREFS.agroExact){
    // Lees token/base uit de invoervelden
    const tEl=document.getElementById('agroTokenInput');
    const bEl=document.getElementById('agroBaseInput');
    if(tEl) PREFS.agroToken=(tEl.value||'').trim();
    if(bEl) PREFS.agroBase=(bEl.value||'').trim();
    savePrefs();
    if(!PREFS.agroToken){
      AGRO.status='error'; AGRO.error='Voer eerst een API-token in';
      buildSettingsModal(); return;
    }

    PREFS.agroExact=true; savePrefs();
    AGRO.stations=null;
    try{ localStorage.removeItem(AGRO_STATIONS_KEY); }catch{}
    AGRO.status='searching'; AGRO.error=null; buildSettingsModal();
    try{
      await agroLoadStations(true);   // test verbinding + vul cache
      await applyAgroStation(S._utcOffset||0);
    }catch(e){
      AGRO.status='error'; AGRO.error=e.message;
      PREFS.agroExact=false; savePrefs();
    }
    buildSettingsModal();
  }else{
    PREFS.agroExact=false; savePrefs();
    AGRO.status='idle'; AGRO.nearest=null; AGRO.error=null; AGRO.data=null;
    if(S.data){ S.data._agro=null; S.data.stationCurrent=null; }
    // Herlaad Open-Meteo data
    showLoad(); run().catch(e=>showErr(e.message));
    buildSettingsModal();
  }
}

function agroStatusHtml(){
  const c={searching:'var(--amber)',loading:'var(--amber)',connected:'var(--green)',too_far:'var(--muted)',none:'var(--muted)',error:'var(--red)',idle:'var(--muted)'}[AGRO.status]||'var(--muted)';
  let txt='';
  switch(AGRO.status){
    case 'searching': txt='Stations zoeken…'; break;
    case 'loading': txt='Stationdata laden…'; break;
    case 'connected': txt=`Verbonden · ${AGRO.nearest?.name} (${AGRO.nearest?.dist.toFixed(1)} km)`; break;
    case 'too_far': txt=`Dichtstbijzijnde station ${AGRO.nearest?.dist.toFixed(1)} km (>10 km) — Open-Meteo gebruikt`; break;
    case 'none': txt='Geen station gevonden'; break;
    case 'error': txt='Fout: '+(AGRO.error||'onbekend'); break;
    default: txt='Niet verbonden';
  }
  return `<span style="color:${c}">${txt}</span>`;
}

    ${sectionHead(L.favs)}
    ${favsHtml}
    ${canAdd?`<button onclick="addCurrentFav()" style="margin-top:10px;width:100%;padding:10px;border-radius:10px;border:1px dashed var(--border2);background:var(--surface);color:var(--accent);font-family:var(--sans);font-size:calc(13px*var(--fz));cursor:pointer">+ ${L.addFav}</button>`:''}
  `;
  // Init drag-and-drop voor favorieten in instellingen
  const sfList=document.getElementById('settingsFavsList');
  if(sfList&&typeof _initFavDnD==='function') _initFavDnD(sfList);
}

/* ── Setter functies (aangeroepen vanuit inline onclick) ─────── */
function setPrefTheme(v){PREFS.theme=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefLang(v){PREFS.lang=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefFontSize(v){PREFS.fontSize=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefTempUnit(v){PREFS.tempUnit=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefWindUnit(v){PREFS.windUnit=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefPresUnit(v){PREFS.presUnit=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefUseHarmonie(v){PREFS.useHarmonie=(v==='true');savePrefs();applyPrefs();buildSettingsModal();if(S.lat&&S.lon){showLoad();run();}}

function addCurrentFav(){
  if(!S.lat||!S.lon||!S.city)return;
  PREFS.favs=PREFS.favs||[];
  if(!PREFS.favs.some(f=>f.name===S.city)){
    PREFS.favs.push({name:S.city,lat:S.lat,lon:S.lon});
    savePrefs();applyPrefs();buildSettingsModal();
  }
}
function deleteFav(i){
  PREFS.favs.splice(i,1);
  savePrefs();applyPrefs();buildSettingsModal();
}

/* ── Favorieten drag-and-drop herordening ─────────────────────── */
(function(){
  let _dragEl=null;
  let _touchItem=null,_touchStartY=0;

  function getFavItems(container){
    return Array.from(container.querySelectorAll('[data-fav-idx]'));
  }

  function saveFavOrder(container){
    const items=getFavItems(container);
    const newFavs=items.map(el=>PREFS.favs[parseInt(el.dataset.favIdx)]).filter(Boolean);
    PREFS.favs=newFavs;
    savePrefs();
    renderFavsStrip();
    // Re-index data attributes so subsequent drags work
    items.forEach((el,i)=>{ el.dataset.favIdx=String(i); });
  }

  window._initFavDnD=function(container){
    const items=getFavItems(container);
    items.forEach(item=>{
      const handle=item.querySelector('.fav-drag-handle');
      // HTML5 drag API
      item.draggable=true;
      item.addEventListener('dragstart',e=>{
        _dragEl=item;
        setTimeout(()=>{ item.style.opacity='.4'; },0);
        e.dataTransfer.effectAllowed='move';
      });
      item.addEventListener('dragend',()=>{
        item.style.opacity='';
        _dragEl=null;
      });
      item.addEventListener('dragover',e=>{
        e.preventDefault();
        if(!_dragEl||_dragEl===item) return;
        const r=item.getBoundingClientRect();
        if(e.clientY<r.top+r.height/2) container.insertBefore(_dragEl,item);
        else container.insertBefore(_dragEl,item.nextSibling);
      });
      item.addEventListener('drop',e=>{
        e.preventDefault();
        saveFavOrder(container);
      });
      // Touch support via drag handle
      if(handle){
        handle.addEventListener('touchstart',e=>{
          _touchItem=item;
          _touchStartY=e.touches[0].clientY;
          item.style.opacity='.5';
          e.stopPropagation();
        },{passive:true});
        handle.addEventListener('touchmove',e=>{
          if(!_touchItem) return;
          const y=e.touches[0].clientY;
          getFavItems(container).forEach(el=>{
            if(el===item) return;
            const r=el.getBoundingClientRect();
            if(y>=r.top&&y<=r.bottom){
              if(y<r.top+r.height/2) container.insertBefore(item,el);
              else container.insertBefore(item,el.nextSibling);
            }
          });
          e.preventDefault();
        },{passive:false});
        handle.addEventListener('touchend',()=>{
          if(_touchItem){ item.style.opacity=''; saveFavOrder(container); _touchItem=null; }
        });
      }
    });
  };
})();
</script>

    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0">

    </div>

    <div id="settingsBody" style="overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 24px;flex:1"></div>

</div>
