<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ensemble Weersverwachting</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--bg2:#111827;
  --surface:rgba(255,255,255,0.055);--surface2:rgba(255,255,255,0.09);
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --accent:#60a5fa;--accent2:#93c5fd;
  --green:#4af0a8;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
  --text:#f0f4f8;--muted:#7a8799;--danger:#f87171;
  --shadow:rgba(0,0,0,0.5);
  --mono:'SF Mono','ui-monospace','SFMono-Regular','Menlo',monospace;
  --sans:-apple-system,'SF Pro Display','SF Pro Text',BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --fz:1;
}
html{height:100%;-webkit-text-size-adjust:100%}
body{
  background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;
  padding:calc(.8rem + var(--st)) calc(.8rem + var(--sr)) calc(1.5rem + var(--sb)) calc(.8rem + var(--sl));
  background-image:
    radial-gradient(ellipse 120% 60% at 50% -20%,rgba(56,130,200,.18) 0%,transparent 55%),
    radial-gradient(ellipse 80% 40% at 80% 120%,rgba(74,200,168,.10) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at -10% 60%,rgba(30,80,160,.12) 0%,transparent 50%);
  -webkit-tap-highlight-color:transparent;
}
.app{max-width:600px;margin:0 auto;padding-bottom:calc(130px + env(safe-area-inset-bottom,0px))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;margin-bottom:12px;overflow:hidden}
.card-title{font-family:var(--mono);font-size:calc(11px*var(--fz));font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.loading{padding:2rem;text-align:center;color:var(--muted);font-family:var(--mono);font-size:calc(13px*var(--fz))}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}
.loc-row{display:flex;gap:6px;padding:12px 14px;align-items:center;border-bottom:1px solid var(--border)}
.loc-input{flex:1;font-size:calc(14px*var(--fz));padding:8px 12px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--mono);outline:none}
.loc-input:focus{border-color:var(--accent)}
.loc-btn{font-size:calc(14px*var(--fz));padding:8px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-family:var(--sans)}
.loc-btn:hover{border-color:var(--accent)}
.loc-btn.primary{background:var(--accent);color:#070a10;border-color:var(--accent)}
.hourly-outer{overflow-x:auto;scrollbar-width:none}
.hourly-outer::-webkit-scrollbar{display:none}
.hourly-scroll{display:flex;padding:8px 8px 10px;min-width:max-content}
.hour-item{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:62px;padding:8px 5px;cursor:pointer;border-radius:12px;transition:background .15s;flex-shrink:0}
.hour-item:hover,.hour-item.active{background:var(--surface2)}
.hour-item.past{opacity:.35}
.hour-item.past:hover,.hour-item.past.active{opacity:.65}
.hour-label{font-family:var(--mono);font-size:calc(12px*var(--fz));color:var(--muted)}
.hour-temp{font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:700}
.hour-icon{font-size:calc(20px*var(--fz))}
.hour-precip{font-family:var(--mono);font-size:calc(12px*var(--fz));font-weight:700;min-height:16px}
.hour-mm{font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--muted);min-height:14px}
.detail{padding:14px 16px;border-top:1px solid var(--border)}
.detail-label{font-family:var(--mono);font-size:calc(10px*var(--fz));font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.val-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.val-cell{background:var(--surface2);border-radius:10px;padding:9px 11px}
.val-cell.future{background:rgba(74,240,168,.07);border:1px solid rgba(74,240,168,.12)}
.val-cell-label{font-family:var(--mono);font-size:calc(10px*var(--fz));letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.val-cell-val{font-family:var(--mono);font-size:calc(20px*var(--fz));font-weight:700}
.val-cell-unit{font-size:calc(12px*var(--fz));color:var(--muted);font-weight:400}
.day-row{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--border);gap:10px;height:50px}
.day-row:last-child{border-bottom:none}
.day-name{font-family:var(--mono);font-size:calc(17px*var(--fz));font-weight:700;width:auto;flex-shrink:0;color:var(--muted)}
.day-icon{font-size:calc(24px*var(--fz));flex-shrink:0;line-height:1}
.day-mid{flex:1;min-width:0}
.day-mid-inner{display:flex;align-items:center;gap:8px}
.day-mid-left{font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:700;flex-shrink:0;min-width:calc(42px*var(--fz));width:auto;text-align:right;white-space:nowrap}
.day-row-inner{display:flex;align-items:center;gap:8px;width:100%}
.day-bar-wrap{position:relative;height:5px;background:var(--surface2);border-radius:3px;margin-top:4px}
.day-bar-fill{position:absolute;height:100%;border-radius:3px}
.day-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;flex-shrink:0;gap:2px}
.day-right-val{font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:700}
.day-right-sub{font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted)}
.tab-row{display:flex;gap:6px;padding:10px 16px 8px;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{font-family:var(--mono);font-size:calc(12px*var(--fz));padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.tab-btn.active{background:var(--accent);color:#070a10;border-color:var(--accent);font-weight:700}
.hero-stat{flex:1;padding:12px 14px;text-align:center}
.hero-stat-label{font-family:var(--mono);font-size:calc(10px*var(--fz));letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.hero-stat-val{font-family:var(--mono);font-family:var(--mono);font-size:calc(20px*var(--fz));font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px}
.hero-stat-div{width:1px;background:var(--border);align-self:stretch}
.err{color:var(--danger);font-family:var(--mono);font-size:calc(13px*var(--fz));padding:1rem;text-align:center}
</style>
</head>
<body>
<div class="app">

  <!-- Favorieten strip bovenin -->
  <div id="favsStrip" style="display:none;padding:6px 12px 8px 12px;overflow-x:auto;white-space:nowrap;scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-bottom:4px"></div>

  <div id="heroBlock" style="display:none">
    <div class="card" style="margin-bottom:12px">
      <!-- Rij 0: locatie + tijd -->
      <div style="padding:14px 16px 6px">
        <div style="font-family:var(--sans);font-size:clamp(calc(1.3rem*var(--fz)),calc(5vw*var(--fz)),calc(1.8rem*var(--fz)));font-weight:800;letter-spacing:-.03em;color:var(--green)" id="cityName"></div>
        <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--muted);margin-top:3px;letter-spacing:.06em" id="heroTime"></div>
      </div>
      <!-- Rij 1: min/max · temp · icoon gelijkmatig verdeeld -->
      <div style="padding:4px 16px 12px;display:flex;justify-content:space-evenly;align-items:center">
        <div style="display:flex;flex-direction:column;gap:4px">
          <div style="font-family:var(--mono);font-size:calc(18px*var(--fz));font-weight:700;display:flex;align-items:center;gap:4px"><span style="color:var(--red)">▲</span><span style="color:var(--muted)" id="heroTempMax"></span></div>
          <div style="font-family:var(--mono);font-size:calc(18px*var(--fz));font-weight:700;display:flex;align-items:center;gap:4px"><span style="color:var(--accent)">▼</span><span style="color:var(--muted)" id="heroTempMin"></span></div>
        </div>
        <div style="font-family:var(--mono);font-size:calc(64px*var(--fz));font-weight:700;line-height:1;letter-spacing:-.04em" id="heroTemp"></div>
        <div id="heroIcon"></div>
      </div>
      <!-- Rij 2: wind / neerslag / vochtigheid -->
      <div style="display:flex;align-items:center;gap:0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
        <div class="hero-stat" id="heroWind"></div>
        <div class="hero-stat-div"></div>
        <div class="hero-stat" id="heroRain"></div>
        <div class="hero-stat-div"></div>
        <div class="hero-stat" id="heroHumidity"></div>
      </div>
      <!-- Rij 3: komende 3 uur -->
      <div style="display:flex;flex-direction:column;border-top:0.5px solid rgba(128,128,128,.18)" id="hero3h"></div>
      <!-- Bekijk meer -->
      <div id="viewMoreBtn" onclick="openHourlyPopup()" style="padding:12px 16px;text-align:center;font-family:var(--mono);font-size:calc(13px*var(--fz));font-weight:600;color:var(--accent);cursor:pointer;border-top:1px solid var(--border);transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">Bekijk meer ›</div>
    </div>
  </div>

  <div id="mainContent" style="display:none">

    <div class="card">
      <div class="card-title"><i class="ti ti-calendar"></i> <span id="dailyCardTitle">7 dagen · ECMWF ENS 51 members</span></div>
      <div class="tab-row">
        <button class="tab-btn active" data-tab="overzicht" onclick="setTab('overzicht',this)">Overzicht</button>
        <button class="tab-btn" data-tab="neerslag" onclick="setTab('neerslag',this)">☔ Neerslag</button>
        <button class="tab-btn" data-tab="temp" onclick="setTab('temp',this)">🌡 Temperatuur</button>
        <button class="tab-btn" data-tab="vocht" onclick="setTab('vocht',this)">💧 Vochtigheid</button>
        <button class="tab-btn" data-tab="wind" onclick="setTab('wind',this)">💨 Wind</button>
        <button class="tab-btn" data-tab="zon" onclick="setTab('zon',this)">☀️ Zon & verdamping</button>
      </div>
      <div id="dailyList"></div>
    </div>

  </div>

  <!-- Popup overlay voor uurverwachting -->
  <div id="hourlyOverlay" onclick="closeHourlyPopup();if(window._dagDetailCleanup){window._dagDetailCleanup();}" style="display:none;position:fixed;inset:0;background:rgba(7,10,16,.85);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:100;align-items:flex-end;justify-content:center"></div>
  <div id="hourlyPopup" style="display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:600px;z-index:101;padding:0 0 env(safe-area-inset-bottom,0)">
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:24px 24px 0 0;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;border-bottom:1px solid var(--border)">
        <span id="hourlyPopupTitle" style="font-size:calc(12px*var(--fz));font-weight:600;letter-spacing:.05em;opacity:.5;text-transform:uppercase">Detail korte termijn</span>
        <button onclick="closeHourlyPopup();if(window._dagDetailCleanup){window._dagDetailCleanup();}" style="border:none;background:var(--surface2);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;font-size:calc(15px*var(--fz));cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
      <!-- Meteogram -->
      <div style="border-bottom:1px solid var(--border)">
        <div style="position:relative;height:150px;padding:8px 14px 0">
          <canvas id="meteoChart" role="img" aria-label="Meteogram met temperatuur en neerslag per uur"></canvas>
        </div>
        <!-- Windpijlen rij -->
        <div id="meteoWind" style="display:flex;padding:4px 14px 8px;overflow:hidden"></div>
      </div>
      <div class="hourly-outer">
        <div class="hourly-scroll" id="hourlyStrip"></div>
      </div>
      <div id="hourDetail" style="padding:12px 14px;border-top:0.5px solid rgba(128,128,128,.18)"></div>
    </div>
  </div>

  <!-- Dag info popup -->
  <div id="dayOverlay" onclick="closeDayPopup()" style="display:none;position:fixed;inset:0;background:rgba(7,10,16,.85);backdrop-filter:blur(10px);z-index:100"></div>
  <div id="dayPopup" style="display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:600px;z-index:101;padding:0 0 env(safe-area-inset-bottom,0)">
    <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:24px 24px 0 0;overflow:hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border)">
        <span id="dayPopupTitle" style="font-family:var(--sans);font-size:calc(16px*var(--fz));font-weight:700"></span>
        <button onclick="closeDayPopup()" style="background:var(--surface2);border:none;color:var(--text);width:30px;height:30px;border-radius:50%;font-size:calc(15px*var(--fz));cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
      <div id="dayPopupBody" style="overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(85dvh - 52px)"></div>
    </div>
  </div>

  <div id="loadingBlock">
    <div class="card"><div class="loading"><span class="spinner"></span><span id="loadingText">Laden (HARMONIE + ECMWF ENS)…</span></div></div>
  </div>
  <div id="errBlock" style="display:none">
    <div class="card"><div class="err" id="errMsg"></div></div>
  </div>
</div>

<!-- ══ FAB knoppen rechtsonder ═══════════════════════════════════════ -->
<div style="position:fixed;bottom:calc(18px + env(safe-area-inset-bottom,0px));right:16px;z-index:290;display:flex;flex-direction:column;gap:10px;align-items:center">
  <button onclick="openSettings()" title="Instellingen"
    style="width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:calc(20px*var(--fz));background:rgba(30,42,68,0.88);color:var(--text);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 4px 20px rgba(0,0,0,.45);transition:transform .15s,opacity .2s;-webkit-tap-highlight-color:transparent"
    onmousedown="this.style.transform='scale(.92)'" onmouseup="this.style.transform=''" ontouchstart="this.style.transform='scale(.92)'" ontouchend="this.style.transform=''">⚙</button>
  <button onclick="openSearch()" title="Zoeken"
    style="width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:calc(22px*var(--fz));background:#3b82f6;color:#fff;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 4px 20px rgba(0,0,0,.45);transition:transform .15s,opacity .2s;-webkit-tap-highlight-color:transparent"
    onmousedown="this.style.transform='scale(.92)'" onmouseup="this.style.transform=''" ontouchstart="this.style.transform='scale(.92)'" ontouchend="this.style.transform=''">⌕</button>
</div>

<!-- ══ Zoek-overlay (schuift omhoog) ═════════════════════════════════ -->
<div id="searchOverlay" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(7,10,16,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);flex-direction:column;padding:calc(1rem + env(safe-area-inset-top,0px)) 1rem 1rem" onclick="if(event.target===this)closeSearch()">
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <input id="locInput" type="search" placeholder="Zoek een stad…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="search"
      style="flex:1;font-size:calc(16px*var(--fz));padding:12px 16px;border-radius:12px;border:1px solid var(--border2);background:rgba(255,255,255,.08);color:var(--text);font-family:var(--mono);outline:none;-webkit-appearance:none"
      oninput="onSearchInput()" onkeydown="if(event.key==='Enter')doSearch();if(event.key==='Escape')closeSearch()">
    <button onclick="useGPS()" title="GPS"
      style="padding:0 14px;border-radius:12px;border:1px solid var(--border2);background:rgba(255,255,255,.08);color:var(--text);font-size:calc(18px*var(--fz));cursor:pointer;white-space:nowrap;flex-shrink:0"><i class="ti ti-current-location"></i></button>
    <button onclick="closeSearch()" id="searchCancelBtn"
      style="padding:0 14px;border-radius:12px;border:none;background:none;color:var(--accent);font-family:var(--sans);font-size:calc(15px*var(--fz));font-weight:600;cursor:pointer;flex-shrink:0">Annuleer</button>
  </div>
  <div id="searchSuggestions" style="flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

function wmoIconName(c,isDay=1){
  if(c==null)  return 'cloudy';
  if(c===0)    return isDay?'clear-day':'clear-night';
  if(c===1)    return isDay?'clear-day':'clear-night';
  if(c===2)    return isDay?'cloudy-1-day':'cloudy-1-night';
  if(c===3)    return 'cloudy';
  if(c<=49)    return isDay?'fog':'fog';
  if(c<=55)    return isDay?'rainy-1-day':'rainy-1-night';
  if(c<=59)    return 'rainy-2';
  if(c<=65)    return 'rainy-2';
  if(c<=67)    return 'rain-and-snow-mix';
  if(c<=73)    return 'snowy-1';
  if(c<=77)    return 'snowy-2';
  if(c<=82)    return isDay?'rainy-1-day':'rainy-1-night';
  if(c<=86)    return isDay?'snowy-2-day':'snowy-2-night';
  if(c<=99)    return 'thunderstorms';
  return 'cloudy';
}
function wmoIcon(c,isDay=1,size=22){
  const name=wmoIconName(c,isDay);
  const src=WI[name]||WI['cloudy'];
  return`<img src="${src}" width="${size}" height="${size}" style="vertical-align:middle;display:inline-block;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.3))" alt="${name}">`;
}
function wi(c,isDay=1,sz=22){return wmoIcon(c,isDay,sz);}

const WMO={0:'Helder',1:'Meest helder',2:'Gedeeltelijk bewolkt',3:'Bewolkt',45:'Mist',48:'Rijpmist',51:'Motregen (licht)',53:'Motregen',55:'Motregen (zwaar)',61:'Regen (licht)',63:'Regen',65:'Regen (zwaar)',71:'Sneeuw (licht)',73:'Sneeuw',75:'Sneeuw (zwaar)',80:'Buien (licht)',81:'Buien',82:'Hevige buien',95:'Onweer',96:'Onweer + hagel',99:'Zwaar onweer'};


function wd(c){return (typeof tWmo==='function')?tWmo(c):(WMO[c]||'Onbekend');}
function rc(p){return p>=60?'var(--red)':p>=30?'var(--amber)':'var(--green)';}
function r1(v){return isNaN(v)?0:Math.round(v*10)/10;}

let S={lat:51.6978,lon:5.3037,city:"'s-Hertogenbosch",hi:0,tab:'neerslag',chart:null,data:null};

function pct(arr,p){
  const s=arr.filter(v=>v!=null&&!isNaN(v)).sort((a,b)=>a-b);
  if(!s.length)return 0;
  const i=(p/100)*(s.length-1),lo=Math.floor(i),hi=Math.ceil(i);
  return s[lo]+(s[hi]-s[lo])*(i-lo);
}
function pge(arr,t){
  const v=arr.filter(v=>v!=null&&!isNaN(v));
  if(!v.length)return 0;
  return v.filter(x=>x>=t).length/v.length*100;
}

async function geocode(name){
  const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=nl&format=json`);
  const d=await r.json();
  if(!d.results?.length)throw new Error('Stad niet gevonden: '+name);
  return{lat:d.results[0].latitude,lon:d.results[0].longitude,city:d.results[0].name};
}

function showLoad(){
  document.getElementById('loadingBlock').style.display='';
  document.getElementById('mainContent').style.display='none';
  document.getElementById('heroBlock').style.display='none';
  document.getElementById('errBlock').style.display='none';
}
function showErr(m){
  document.getElementById('loadingBlock').style.display='none';
  document.getElementById('errBlock').style.display='';
  document.getElementById('errMsg').textContent='Fout: '+m;
  // Voeg opnieuw proberen knop toe
  const eb=document.getElementById('errBlock');
  if(!eb.querySelector('button')){
    const btn=document.createElement('button');
    btn.textContent='Opnieuw proberen';
    btn.className='loc-btn primary';
    btn.style.marginTop='12px';
    btn.onclick=()=>{eb.querySelector('button')?.remove();showLoad();run().catch(e=>showErr(e.message));};
    eb.appendChild(btn);
  }
}

async function loadLocation(){
  const v=document.getElementById('locInput').value.trim();
  if(!v)return;
  showLoad();
  try{const g=await geocode(v);S.lat=g.lat;S.lon=g.lon;S.city=g.city;await run();}
  catch(e){showErr(e.message);}
}
function useGPS(){
  if(!navigator.geolocation){showErr('Geolocatie niet beschikbaar');return;}
  closeSearch();
  showLoad();
  navigator.geolocation.getCurrentPosition(
    async p=>{S.lat=p.coords.latitude;S.lon=p.coords.longitude;S.city='Jouw locatie';
      try{await run();}catch(e){showErr(e.message);}},
    ()=>showErr('Locatietoegang geweigerd'));
}

let _searchTmt=null;
function openSearch(){
  const el=document.getElementById('searchOverlay');
  el.style.display='flex';
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('locInput').focus(),80);
}
function closeSearch(){
  document.getElementById('searchOverlay').style.display='none';
  document.getElementById('searchSuggestions').innerHTML='';
  document.getElementById('locInput').value='';
  document.body.style.overflow='';
}
function onSearchInput(){
  clearTimeout(_searchTmt);
  const q=document.getElementById('locInput').value.trim();
  if(q.length<2){document.getElementById('searchSuggestions').innerHTML='';return;}
  _searchTmt=setTimeout(()=>_doGeoSearch(q),360);
}
async function _doGeoSearch(q){
  const lang=(typeof PREFS!=='undefined'&&PREFS.lang)||'nl';
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=7&accept-language=${lang}`);
    const results=await r.json();
    const sug=document.getElementById('searchSuggestions');
    if(!results.length){sug.innerHTML=`<div style="padding:1.2rem;font-family:var(--mono);font-size:calc(13px*var(--fz));color:var(--muted)">${t('noResults')}</div>`;return;}
    sug.innerHTML=results.map(res=>{
      const parts=res.display_name.split(',');
      const name=parts.slice(0,2).join(',').trim();
      const sub=parts.slice(2,4).join(',').trim();
      const lat=parseFloat(res.lat),lon=parseFloat(res.lon);
      return`<div
        onclick="pickLocation(${lat},${lon},'${res.display_name.split(',').slice(0,3).join(',').replace(/'/g,'&#39;')}')"
        style="padding:14px 18px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;transition:background .12s"
        onmouseover="this.style.background='rgba(255,255,255,.06)'" onmouseout="this.style.background=''">
        <div>
          <div style="font-family:var(--mono);font-size:calc(14px*var(--fz));color:var(--text);font-weight:600">${name}</div>
          ${sub?`<div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--muted);margin-top:2px">${sub}</div>`:''}
        </div>
        <span style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);white-space:nowrap;flex-shrink:0">${lat.toFixed(2)}, ${lon.toFixed(2)}</span>
      </div>`;
    }).join('');
  }catch(e){console.warn('Geocode fout',e);}
}
function doSearch(){
  const q=document.getElementById('locInput').value.trim();
  if(q)_doGeoSearch(q);
}
function pickLocation(lat,lon,name){
  closeSearch();
  S.lat=lat;S.lon=lon;S.city=name;
  if(typeof renderFavsStrip==='function') renderFavsStrip();
  showLoad();run().catch(e=>showErr(e.message));
}

async function run(){
  const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
  const vars='temperature_2m,precipitation,windspeed_10m,winddirection_10m,weathercode,relativehumidity_2m,cloudcover,dewpoint_2m,apparent_temperature,surface_pressure,et0_fao_evapotranspiration,windgusts_10m';

  const safeFetch=async(url,name,retries=2)=>{
    for(let i=0;i<=retries;i++){
      try{
        const r=await fetch(url);
        if(r.status===429&&i<retries){await new Promise(r=>setTimeout(r,600*(i+1)));continue;}
        return r;
      }catch(e){
        if(i===retries)throw new Error(`${name}: ${e.message}`);
        await new Promise(r=>setTimeout(r,400*(i+1)));
      }
    }
  };

  // ── Stap 1: OBS + HARMONIE (klein/snel) → toon hero direct ──
  const obsUrl=`https://api.open-meteo.com/v1/forecast?${base}&hourly=${vars}&current_weather=true&past_days=1&forecast_days=1`;
  const harmUrl=`https://api.open-meteo.com/v1/forecast?${base}&hourly=${vars}&current_weather=true&forecast_days=2&models=knmi_harmonie_arome_europe`;

  const oR=await safeFetch(obsUrl,'Obs');
  if(!oR.ok)throw new Error(`Obs ${oR.status}`);
  const hR=await safeFetch(harmUrl,'HARMONIE');
  if(!hR.ok)throw new Error(`HARMONIE ${hR.status}`);
  const [oJ,hJ]=await Promise.all([oR.json(),hR.json()]);

  S.data=processAll(oJ,hJ,null,null,null,null);
  document.getElementById('loadingBlock').style.display='none';
  document.getElementById('heroBlock').style.display='';
  document.getElementById('mainContent').style.display='';
  render();

  // ── Stap 2: ENS dagelijks + Sun + IFS dagelijks parallel op achtergrond ──
  const ensUrl=`https://ensemble-api.open-meteo.com/v1/ensemble?${base}&daily=precipitation_sum,temperature_2m_max,temperature_2m_min,windspeed_10m_max&hourly=relativehumidity_2m,weathercode&models=ecmwf_ifs025&forecast_days=7`;
  const sunUrl=`https://api.open-meteo.com/v1/forecast?${base}&hourly=sunshine_duration,et0_fao_evapotranspiration,winddirection_10m&forecast_days=7`;
  const hresUrl=`https://api.open-meteo.com/v1/ecmwf?${base}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,winddirection_10m_dominant,weather_code,dewpoint_2m_max,dewpoint_2m_min&forecast_days=7`;
  try{
    const [eR,sR,iR]=await Promise.all([safeFetch(ensUrl,'ENS'),safeFetch(sunUrl,'Sun'),safeFetch(hresUrl,'IFS')]);
    const eJ=eR?.ok?await eR.json():null;
    const sJ=sR?.ok?await sR.json():null;
    const iJ=iR?.ok?await iR.json():null;
    S._oJ=oJ;S._hJ=hJ;S._eJ=eJ;S._sJ=sJ;S._ifsJ=iJ;
    if(iJ) S._ifsLoaded=true;
    S.data=processAll(oJ,hJ,eJ,sJ,iJ,null);
    renderDaily();
    updateDailyTitle();
  }catch(e){console.warn('Achtergrond laden mislukt:',e.message);}

  // ── IFS uurlijks: alleen bij klikken neerslag popup ──
  S._oJ=S._oJ||oJ; S._hJ=S._hJ||hJ;
}

async function loadVochtIfNeeded(){
  if(S._vochtLoaded) return;
  const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
  // HARMONIE uurlijks: temp + dauwpunt voor dag 0-1
  const harmVochtUrl=`https://api.open-meteo.com/v1/forecast?${base}&hourly=temperature_2m,dewpoint_2m&forecast_days=2&models=knmi_harmonie_arome_europe`;
  // IFS uurlijks: temp + dauwpunt voor dag 2-3 (al in ihJ als geladen, anders fetch)
  try{
    const r=await fetch(harmVochtUrl);
    if(!r.ok) return;
    const j=await r.json();
    const ht=j.hourly?.time||[], temp=j.hourly?.temperature_2m||[], dew=j.hourly?.dewpoint_2m||[];
    const magnus=(T,Td)=>T!=null&&Td!=null?Math.min(100,Math.round(100*Math.exp(17.625*Td/(243.04+Td))/Math.exp(17.625*T/(243.04+T)))):null;
    // Bereken RH min/max per dag
    const harmRhByDay={};
    ht.forEach((t,i)=>{
      const day=t.slice(0,10);
      const rh=magnus(temp[i],dew[i]);
      if(rh==null) return;
      if(!harmRhByDay[day]) harmRhByDay[day]={min:100,max:0};
      harmRhByDay[day].min=Math.min(harmRhByDay[day].min,rh);
      harmRhByDay[day].max=Math.max(harmRhByDay[day].max,rh);
    });
    // Update days met HARMONIE RH
    S.data.days.forEach(d=>{
      if(d.useHarm&&harmRhByDay[d.date]){
        d.harmRhMin=harmRhByDay[d.date].min;
        d.harmRhMax=harmRhByDay[d.date].max;
      }
    });
    S._vochtLoaded=true;
  }catch(e){console.warn('HARMONIE vocht laden mislukt:',e.message);}

  // IFS uurlijks voor dag 2-3: gebruik hresRhByDay als ihJ al geladen
  // Anders: haal IFS uurlijks op
  if(!S._ifsVochtLoaded){
    try{
      const b=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
      const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?${b}&hourly=temperature_2m,dewpoint_2m&forecast_days=7`);
      if(r.ok){
        const j=await r.json();
        const ht=j.hourly?.time||[], temp=j.hourly?.temperature_2m||[], dew=j.hourly?.dewpoint_2m||[];
        const magnus=(T,Td)=>T!=null&&Td!=null?Math.min(100,Math.round(100*Math.exp(17.625*Td/(243.04+Td))/Math.exp(17.625*T/(243.04+T)))):null;
        const ifsRhByDay={};
        ht.forEach((t,i)=>{
          const day=t.slice(0,10);
          const rh=magnus(temp[i],dew[i]);
          if(rh==null) return;
          if(!ifsRhByDay[day]) ifsRhByDay[day]={min:100,max:0};
          ifsRhByDay[day].min=Math.min(ifsRhByDay[day].min,rh);
          ifsRhByDay[day].max=Math.max(ifsRhByDay[day].max,rh);
        });
        S.data.days.forEach(d=>{
          if(!d.useHarm&&ifsRhByDay[d.date]){
            d.hresRhMin=ifsRhByDay[d.date].min;
            d.hresRhMax=ifsRhByDay[d.date].max;
          }
        });
        S._ifsVochtLoaded=true;
      }
    }catch(e){console.warn('IFS vocht laden mislukt:',e.message);}
  }
}

async function loadIfsIfNeeded(){
  if(S._ifsLoaded||S._ifsLoading) return;
  S._ifsLoading=true;
  const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
  const safeFetch=async(url,name)=>{
    try{ const r=await fetch(url); return r; }
    catch(e){ console.warn(name+' mislukt:',e.message); return null; }
  };
  const hresUrl=`https://api.open-meteo.com/v1/ecmwf?${base}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,winddirection_10m_dominant,weather_code,dewpoint_2m_max,dewpoint_2m_min&forecast_days=7`;
  try{
    const iR=await safeFetch(hresUrl,'IFS');
    const iJ=iR?.ok?await iR.json():null;
    if(iJ){
      S._ifsJ=iJ;
      S.data=processAll(S._oJ,S._hJ,S._eJ,S._sJ,iJ,null);
      S._ifsLoaded=true;
      updateDailyTitle();
      if(dTab==='overzicht')renderDaily();
    }
  }catch(e){console.warn('IFS dagelijks mislukt:',e.message);}
  S._ifsLoading=false;
}


function processAll(oJ,hJ,eJ,sJ,iJ,ihJ){
  const iphJ=ihJ; // precipitation+weather_code zitten in ihJ
  // ── Determine "nowHour" robustly ──
  // current_weather.time is in the API's local timezone (same as timezone=auto).
  // It may be "YYYY-MM-DDTHH:MM" — truncate to the hour boundary.
  // We use this string as the cut point for all three arrays.
  const cwTime = oJ.current_weather?.time ?? hJ.current_weather?.time ?? '';
  // Truncate to hour: "2025-06-03T14:30" -> "2025-06-03T14:00"
  const nowHour = cwTime.slice(0,13) + ':00';

  // ── PAST 12h: take the 12 hours strictly before nowHour ──
  const oh=oJ.hourly, ot=oh.time;
  // Collect all obs times < nowHour
  const pastCandidates = [];
  for(let i=0;i<ot.length;i++){
    if(ot[i] < nowHour) pastCandidates.push(i);
  }
  // Take the last 12
  const pastIndices = pastCandidates.slice(-12);
  const pastHours = pastIndices.map(i=>({
    time: ot[i],
    temp: oh.temperature_2m[i]!=null ? Math.round(oh.temperature_2m[i]) : null,
    precip: r1(oh.precipitation[i]??0),
    wind: oh.windspeed_10m[i]!=null ? Math.round(oh.windspeed_10m[i]) : null,
    humidity: oh.relativehumidity_2m?.[i]!=null ? Math.round(oh.relativehumidity_2m[i]) : null,
    wmo: oh.weathercode[i]??0,
    isDay: isHourDay(oh.time[i], S.lat),
    isPast: true,
  }));

  // ── FUTURE 24h from HARMONIE: hours >= nowHour ──
  const hh=hJ.hourly, ht=hh.time;
  const futureHours = [];
  for(let i=0;i<ht.length;i++){
    if(ht[i] >= nowHour && futureHours.length < 48){
      futureHours.push({
        time: ht[i],
        temp: hh.temperature_2m[i]!=null ? Math.round(hh.temperature_2m[i]) : null,
        precip: r1(hh.precipitation[i]??0),
        wind: hh.windspeed_10m[i]!=null ? Math.round(hh.windspeed_10m[i]) : null,
        gusts: hh.windgusts_10m?.[i]!=null?Math.round(hh.windgusts_10m[i]):null,
        feelsLike: hh.apparent_temperature?.[i]!=null?Math.round(hh.apparent_temperature[i]):null,
        et0h: hh.et0_fao_evapotranspiration?.[i]!=null?r1(hh.et0_fao_evapotranspiration[i]):null,
        pressure: hh.surface_pressure?.[i]!=null?Math.round(hh.surface_pressure[i]):null,
        dewpoint: hh.dewpoint_2m?.[i]!=null?Math.round(hh.dewpoint_2m[i]):null,
        humidity: hh.relativehumidity_2m?.[i]!=null ? Math.round(hh.relativehumidity_2m[i]) : null,
        wmo: hh.weathercode[i]??0,
        isDay: isHourDay(ht[i], S.lat),
        sunMin: isHourDay(ht[i],S.lat)?Math.round((1-(hh.cloudcover?.[i]??100)/100)*60):0,
        windDir: hh.winddirection_10m?.[i]!=null?Math.round(hh.winddirection_10m[i]):null,
        isPast: false,
        pChance:null, p2mm:null, p10mm:null,
      });
    }
  }

  // windDir en sunMin komen nu direct uit HARMONIE

  // ── ENS: dagelijkse members ──
  const ed=eJ?.daily||{}, edt=ed.time||[];
  const eh=eJ?.hourly||{}, eht=eh.time||[];
  function getDM(pfx){return Object.keys(ed).filter(k=>k.startsWith(pfx+'_member')).map(k=>ed[k]);}
  const PM=getDM('precipitation_sum'); const PM2=PM.length?PM:[ed.precipitation_sum||[]];
  const TMaxM=getDM('temperature_2m_max'); const TMaxM2=TMaxM.length?TMaxM:[ed.temperature_2m_max||[]];
  const TMinM=getDM('temperature_2m_min'); const TMinM2=TMinM.length?TMinM:[ed.temperature_2m_min||[]];
  const WM=getDM('windspeed_10m_max'); const WM2=WM.length?WM:[ed.windspeed_10m_max||[]];

  // futureHours pChance: null — wordt lazy berekend bij klik neerslag dag popup
  futureHours.forEach(h=>{
    h.pChance=null;
    h.precipP10=null; h.precipP25=null; h.precipP50=null; h.precipP75=null; h.precipP90=null;
  });

  // ── ENS dagelijkse aggregatie ──
  const today=nowHour.slice(0,10);
  const dayMap={}, dayOrder=[];
  for(let i=0;i<edt.length;i++){
    const d=edt[i];
    if(d<today) continue; // vandaag wél meenemen
    dayMap[d]={date:d,
      ps:PM2.map(m=>m[i]??0),
      taMax:TMaxM2.map(m=>m[i]??-Infinity),
      taMin:TMinM2.map(m=>m[i]??Infinity),
      waMax:WM2.map(m=>m[i]??-Infinity),
      ha:[], wmos:[]};
    dayOrder.push(d);
  }
  // Uurlijkse humidity + weathercode (enkelvoudig, niet per member)
  for(let i=0;i<eht.length;i++){
    const d=eht[i].slice(0,10);
    if(!dayMap[d])continue;
    const o=dayMap[d];
    const hVal=eh.relativehumidity_2m?.[i];
    if(hVal!=null)o.ha.push(hVal);
    if(eh.weathercode?.[i]!=null)o.wmos.push(eh.weathercode[i]);
  }
  // ── Sunshine per dag (seconden→uren) uit reguliere forecast ──
  const sunByDay={}, et0ByDay={}, windDirByDay={};
  if(sJ?.hourly?.time){
    const st=sJ.hourly.time, sd=sJ.hourly.sunshine_duration||[], et=sJ.hourly.et0_fao_evapotranspiration||[], wd=sJ.hourly.winddirection_10m||[];
    // Voor windrichting: vectorgemiddelde (sin/cos) om 359°→0° correct te behandelen
    const wdSin={}, wdCos={}, wdCount={};
    st.forEach((t,i)=>{
      const day=t.slice(0,10);
      sunByDay[day]=(sunByDay[day]||0)+(sd[i]||0);
      et0ByDay[day]=(et0ByDay[day]||0)+(et[i]||0);
      if(wd[i]!=null){
        const rad=wd[i]*Math.PI/180;
        wdSin[day]=(wdSin[day]||0)+Math.sin(rad);
        wdCos[day]=(wdCos[day]||0)+Math.cos(rad);
        wdCount[day]=(wdCount[day]||0)+1;
      }
    });
    Object.keys(wdSin).forEach(day=>{
      const deg=Math.atan2(wdSin[day]/wdCount[day], wdCos[day]/wdCount[day])*180/Math.PI;
      windDirByDay[day]=Math.round((deg+360)%360);
    });
  }

  // ── HARMONIE dag aggregatie (vandaag + morgen) ──
  const harmDays={};
  if(hJ?.hourly?.time){
    const ht=hJ.hourly, htm=ht.time||[];
    htm.forEach((t,i)=>{
      const day=t.slice(0,10);
      if(!harmDays[day]) harmDays[day]={temps:[],precips:[],winds:[],wmos:[],cloud:[]};
      const o=harmDays[day];
      if(ht.temperature_2m?.[i]!=null) o.temps.push(ht.temperature_2m[i]);
      if(ht.precipitation?.[i]!=null) o.precips.push(ht.precipitation[i]);
      if(ht.windspeed_10m?.[i]!=null) o.winds.push(ht.windspeed_10m[i]);
      if(ht.weathercode?.[i]!=null) o.wmos.push(ht.weathercode[i]);
      if(ht.cloudcover?.[i]!=null) o.cloud.push(ht.cloudcover[i]);
      if(ht.dewpoint_2m?.[i]!=null&&ht.temperature_2m?.[i]!=null) o.rhvals=o.rhvals||[],(()=>{const T=ht.temperature_2m[i],Td=ht.dewpoint_2m[i];const rh=Math.round(100*Math.exp(17.625*Td/(243.04+Td))/Math.exp(17.625*T/(243.04+T)));o.rhvals.push(rh);})();
    });
  }

  // ── HRES dagdata koppelen ──
  const hresDays={};
  let hresRunLabel=null;
  if(iJ?.daily?.time){
    const id=iJ.daily;
    // ECMWF IFS draait 4x per dag: 00, 06, 12, 18 UTC
    // Open-Meteo geeft geen run-tijd terug, maar we kunnen schatten
    // op basis van generationtime en huidig uur
    const genMs=iJ.generationtime_ms??0;
    const now=new Date();
    const utcH=now.getUTCHours();
    // Laatste voltooide run: 00z (+~4u beschikbaar), 06z, 12z, 18z
    const runs=[0,6,12,18];
    const lastRun=runs.filter(r=>utcH>=r+3).pop()??18;
    hresRunLabel=`IFS ${String(lastRun).padStart(2,'0')}z`;
    id.time.forEach((t,i)=>{
      hresDays[t]={
        hresTempMax: id.temperature_2m_max?.[i]!=null ? Math.round(id.temperature_2m_max[i]) : null,
        hresTempMin: id.temperature_2m_min?.[i]!=null ? Math.round(id.temperature_2m_min[i]) : null,
        hresPrecip:  r1(id.precipitation_sum?.[i]??0),
        hresPrecipChance: id.precipitation_probability_max?.[i]??null,
        hresWindMax: id.windspeed_10m_max?.[i]!=null ? Math.round(id.windspeed_10m_max[i]) : null,
        hresWindDir: id.winddirection_10m_dominant?.[i]!=null ? Math.round(id.winddirection_10m_dominant[i]) : null,
        hresWmo: id.weather_code?.[i]??null,
        // RH uit dauwpunt via Magnus: RH_max uit (Tmin,Tdmax), RH_min uit (Tmax,Tdmin)
        hresRhMax: (()=>{const T=id.temperature_2m_min?.[i],Td=id.dewpoint_2m_max?.[i];return T!=null&&Td!=null?Math.min(100,Math.round(100*Math.exp(17.625*Td/(243.04+Td))/Math.exp(17.625*T/(243.04+T)))):null;})(),
        hresRhMin: (()=>{const T=id.temperature_2m_max?.[i],Td=id.dewpoint_2m_min?.[i];return T!=null&&Td!=null?Math.min(100,Math.round(100*Math.exp(17.625*Td/(243.04+Td))/Math.exp(17.625*T/(243.04+T)))):null;})(),
      };
    });
  }

  // ── IFS uurlijkse neerslag per dag ──
  const hresHoursByDay={};
  if(iphJ?.hourly?.time){
    const pt=iphJ.hourly.time, pp=iphJ.hourly.precipitation||[], pw=iphJ.hourly.weather_code||iphJ.hourly.weathercode||[];
    // Eerste 90u = echt uurlijks, daarna 3-uurlijks (elke 3u een echte waarde)
    pt.forEach((t,i)=>{
      const day=t.slice(0,10);
      const hourNum=parseInt(t.slice(11,13));
      // Na 90u: alleen uren deelbaar door 3 tonen (3-uurlijkse resolutie)
      const isReal=i<90||(hourNum%3===0);
      if(!isReal)return;
      if(!hresHoursByDay[day])hresHoursByDay[day]=[];
      hresHoursByDay[day].push({
        time:t,
        hour:hourNum,
        precip:pp[i]!=null?r1(pp[i]):0,
        wmo:pw[i]??0,
        is3h:i>=90,
      });
    });
  }

  // ── IFS RH uit dauwpunt + temperatuur (Magnus formule) ──
  const hresRhByDay={};
  if(ihJ?.hourly?.time){
    const ht=ihJ.hourly.time, htemp=ihJ.hourly.temperature_2m||[], hdew=ihJ.hourly.dewpoint_2m||[];
    const magnus=(T,Td)=>{
      if(T==null||Td==null)return null;
      return Math.round(100*Math.exp(17.625*Td/(243.04+Td))/Math.exp(17.625*T/(243.04+T)));
    };
    ht.forEach((t,i)=>{
      const day=t.slice(0,10);
      const rh=magnus(htemp[i],hdew[i]);
      if(rh==null)return;
      if(!hresRhByDay[day])hresRhByDay[day]={min:100,max:0};
      hresRhByDay[day].min=Math.min(hresRhByDay[day].min,rh);
      hresRhByDay[day].max=Math.max(hresRhByDay[day].max,rh);
    });
  }

  const days=dayOrder.slice(0,7).map((d,dayIdx)=>{
    const o=dayMap[d];
    const harm=harmDays[d]||{};
    const useHarm=dayIdx<=1; // vandaag + morgen: HARMONIE
    const wmoMode=o.wmos.length?o.wmos.reduce((a,b,_,arr)=>arr.filter(v=>v===b).length>=arr.filter(v=>v===a).length?b:a,o.wmos[0]):(harm.wmos?.length?harm.wmos.reduce((a,b,_,arr)=>arr.filter(v=>v===b).length>=arr.filter(v=>v===a).length?b:a,harm.wmos[0]):0);
    const sunHours=sunByDay[d]!=null ? r1(sunByDay[d]/3600) : null;
    const et0=et0ByDay[d]!=null ? r1(et0ByDay[d]) : null;
    const windDir=windDirByDay[d]??null;
    // HARMONIE dag waarden
    const harmTempMax=harm.temps?.length?Math.round(Math.max(...harm.temps)):null;
    const harmTempMin=harm.temps?.length?Math.round(Math.min(...harm.temps)):null;
    const harmPrecip=harm.precips?.length?r1(harm.precips.reduce((a,b)=>a+b,0)):null;
    const harmWindMax=harm.winds?.length?Math.round(Math.max(...harm.winds)):null;
    const harmRhMin=harm.rhvals?.length?Math.min(...harm.rhvals):null;
    const harmRhMax=harm.rhvals?.length?Math.max(...harm.rhvals):null;
    return{date:d, useHarm,
      precipP10:r1(pct(o.ps,10)),precipP25:r1(pct(o.ps,25)),
      precipMedian:r1(pct(o.ps,50)),precipP75:r1(pct(o.ps,75)),precipP90:r1(pct(o.ps,90)),
      pChance:Math.round(pge(o.ps,.1)),p5mm:Math.round(pge(o.ps,5)),p20mm:Math.round(pge(o.ps,20)),
      tempLo:Math.round(pct(o.taMin.filter(v=>v!==Infinity),10)),tempHi:Math.round(pct(o.taMax.filter(v=>v!==-Infinity),90)),
      tempMaxP10:Math.round(pct(o.taMax.filter(v=>v!==-Infinity),10)),
      tempMaxP50:Math.round(pct(o.taMax.filter(v=>v!==-Infinity),50)),
      tempMaxP90:Math.round(pct(o.taMax.filter(v=>v!==-Infinity),90)),
      tempMinP10:Math.round(pct(o.taMin.filter(v=>v!==Infinity),10)),
      tempMinP50:Math.round(pct(o.taMin.filter(v=>v!==Infinity),50)),
      tempMinP90:Math.round(pct(o.taMin.filter(v=>v!==Infinity),90)),
      tempMaxP25:Math.round(pct(o.taMax.filter(v=>v!==-Infinity),25)),
      tempMaxP75:Math.round(pct(o.taMax.filter(v=>v!==-Infinity),75)),
      tempMinP25:Math.round(pct(o.taMin.filter(v=>v!==Infinity),25)),
      tempMinP75:Math.round(pct(o.taMin.filter(v=>v!==Infinity),75)),
      windP10:Math.round(pct(o.waMax.filter(v=>v!==-Infinity),10)),
      windP25:Math.round(pct(o.waMax.filter(v=>v!==-Infinity),25)),
      windP75:Math.round(pct(o.waMax.filter(v=>v!==-Infinity),75)),
      windP50:Math.round(pct(o.waMax.filter(v=>v!==-Infinity),50)),
      windP90:Math.round(pct(o.waMax.filter(v=>v!==-Infinity),90)),
      humidityMedian:o.ha.length?Math.round(pct(o.ha,50)):null,
      humidityP10:o.ha.length?Math.round(pct(o.ha,10)):null,
      humidityP25:o.ha.length?Math.round(pct(o.ha,25)):null,
      humidityP75:o.ha.length?Math.round(pct(o.ha,75)):null,
      humidityP90:o.ha.length?Math.round(pct(o.ha,90)):null,
      sunHours, et0, windDir,
      wmo:wmoMode, nMembers:PM2.length, ...(hresDays[d]||{}),
      harmTempMax, harmTempMin, harmPrecip, harmWindMax, harmRhMin, harmRhMax,
      hresRhMin: hresRhByDay[d]?.min??null,
      hresRhMax: hresRhByDay[d]?.max??null,
    };
  });

  const curH = futureHours[0] || pastHours[pastHours.length-1];
  return{
    pastHours, futureHours,
    allHours: [...pastHours, ...futureHours],
    nowHour,
    days,
    currentTemp: curH?.temp ?? 0,
    currentWmo: curH?.wmo ?? 0,
    nMembers: PM2.length,
    hresRunLabel: hresRunLabel??null,
    hresHoursByDay,
  };
}

function render(){
  const d=S.data;
  S.hi = d.pastHours.length;

  // Locatie + tijd
  document.getElementById('cityName').textContent=S.city;
  const nowH=d.nowHour;
  document.getElementById('heroTime').textContent=nowH?nowH.slice(11,16):'';

  // Huidige temp + icoon
  const curH=d.futureHours[0]||d.pastHours[d.pastHours.length-1];
  document.getElementById('heroTemp').textContent=fmtTempShort(curH?.temp);
  document.getElementById('heroIcon').innerHTML=wi(curH?.wmo??0,curH?.isDay??1,72);

  // Max/min afgelopen 24u uit obs
  const obsTemps=d.pastHours.map(h=>h.temp).filter(v=>v!=null);
  const obsMax=obsTemps.length?Math.max(...obsTemps):null;
  const obsMin=obsTemps.length?Math.min(...obsTemps):null;
  document.getElementById('heroTempMax').textContent=fmtTempShort(obsMax);
  document.getElementById('heroTempMin').textContent=fmtTempShort(obsMin);

  // Wind huidig uur (eerste future uur)
  const curWind=curH?.wind??null;
  const curWindDir=d.days[0]?.windDir??null;
  document.getElementById('heroWind').innerHTML=`
    <div class="hero-stat-label">${t('hWind')}</div>
    <div class="hero-stat-val">${degToArrow(curWindDir)} ${fmtWind(curWind)}</div>`;

  // Neerslag afgelopen 24u (som obs uren)
  const rain24=r1(d.pastHours.reduce((s,h)=>s+(h.precip||0),0));
  document.getElementById('heroRain').innerHTML=`
    <div class="hero-stat-label">${t('hRain24')}</div>
    <div class="hero-stat-val">💧 ${rain24} <span style="font-size:calc(10px*var(--fz));opacity:.5">mm</span></div>`;

  // Luchtvochtigheid huidig uur
  const curHumidity=curH?.humidity??'—';
  document.getElementById('heroHumidity').innerHTML=`
    <div class="hero-stat-label">${t('hHumidity')}</div>
    <div class="hero-stat-val">${curHumidity}<span style="font-size:calc(10px*var(--fz));opacity:.5">%</span></div>`;

  // 3-uurs preview: eerste 3 toekomstige uren onder elkaar
  const next3=d.futureHours.slice(1,4);
  const pastLen=d.pastHours.length;
  document.getElementById('hero3h').innerHTML=next3.map((h,i)=>{
    const absIdx=pastLen+1+i;
    return`<div onclick="openHourlyPopup(${absIdx})" style="display:grid;grid-template-columns:40px 1fr 28px 1fr auto 1fr auto 1fr auto 1fr auto;align-items:center;padding:10px 16px;${i<2?'border-bottom:1px solid var(--border)':''}cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
      <span style="font-family:var(--mono);font-size:calc(17px*var(--fz));font-weight:600;color:var(--muted)">${h.time.slice(11,16)}</span>
      <span></span>
      <span style="font-size:calc(24px*var(--fz));line-height:1;text-align:center">${wi(h.wmo,h.isDay??1,24)}</span>
      <span></span>

  if(dTab==='overzicht') loadIfsIfNeeded();
}

function precipColor(mm){
  // 0 mm = grijs, oplopend naar donkerblauw
  if(!mm||mm<=0) return 'var(--muted)';
  const t=Math.min(mm/5,1); // 5mm = vol blauw
  const r=Math.round(128*(1-t)+Math.round(30*t));
  const g=Math.round(135*(1-t)+Math.round(100*t));
  const b=Math.round(153*(1-t)+Math.round(220*t));
  return `rgb(${r},${g},${b})`;
}

function renderHourly(){
  const all=S.data.allHours;
  const pastLen=S.data.pastHours.length;
  // Eerste toekomstige uur = overgang past→future
  const firstFutureIdx=all.findIndex(h=>!h.isPast);

  let html='';
  all.forEach((h,i)=>{
    const isPast=h.isPast;
    const isNow=(i===firstFutureIdx&&firstFutureIdx>0);
    const nowStyle=isNow?'border-left:2px solid rgba(128,128,128,.25);margin-left:4px;padding-left:5px':'';
    const precip=h.precip??0;
    const precipCol=isPast?'var(--muted)':precipColor(precip);
    const precipStr=precip>0?precip.toFixed(1)+' mm':'0 mm';
    const sunMin=h.sunMin??0;
    const wind=h.wind??'—';
    const windDir=h.windDir??null;

    html+=`<div class="hour-item ${isPast?'past':''} ${i===S.hi?'active':''}" onclick="selHour(${i})" style="${nowStyle}">
      <span class="hour-label">${h.time.slice(11,16)}</span>
      <span class="hour-icon" style="${isPast?'filter:saturate(.3)':''}">${wi(h.wmo,h.isDay??1)}</span>
      <span class="hour-temp">${fmtTempShort(h.temp)}</span>
      <span class="hour-precip" style="color:${precipCol};font-size:calc(11px*var(--fz))">${precipStr}</span>
      <span class="hour-mm" style="color:var(--muted)">${fmtWind(h.wind)}</span>
      <span style="font-family:var(--mono);font-size:calc(12px*var(--fz));color:var(--muted);min-height:14px">${windDir!=null?`<span style="display:inline-block;transform:rotate(${(windDir+180)%360}deg)">↑</span>`:'·'}</span>
      <span style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:${sunMin>0?'var(--amber)':'var(--muted)'};min-height:13px">${sunMin>0?sunMin+'m':'·'}</span>
    </div>`;
  });

  document.getElementById('hourlyStrip').innerHTML=html;

  // Scroll so the first future hour is ~35% from left
  requestAnimationFrame(()=>{
    const outer=document.querySelector('.hourly-outer');
    const strip=document.querySelector('.hourly-scroll');
    if(!outer||!strip)return;
    const items=strip.querySelectorAll('.hour-item');
    if(S.keepScroll){
      // Scroll zodat het geklikte uur in het midden staat
      const sel=items[S.hi];
      if(sel){
        const target=sel.offsetLeft - outer.clientWidth/2 + sel.offsetWidth/2;
        outer.scrollLeft=Math.max(0,target);
      }
      S.keepScroll=false;
    } else {
      const nowItem=items[firstFutureIdx>=0?firstFutureIdx:0];
      if(nowItem){
        const target=nowItem.offsetLeft - outer.clientWidth*0.35;
        outer.scrollLeft=Math.max(0,target);
      }
    }
  });

  renderHD();
}

async function selHour(i){
  S.hi=i;
  S.keepScroll=true;
  renderHourly();

  const h=S.data.allHours[i];
  if(h&&!h.isPast&&S._dagDetailBron==='IFS'&&h._ifsDetailLoaded!==true){
    h._ifsDetailLoaded=true; // sentinel: niet opnieuw proberen
    const el=document.getElementById('hourDetail');
    el.querySelectorAll('.val-cell-val').forEach(v=>{
      if(v.textContent.trim()==='—'){
        v.innerHTML='<span class="spinner" style="width:12px;height:12px;margin:0"></span>';
      }
    });
    try{
      const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
      const date=h.time.slice(0,10);
      const dayNum=S.data.days.findIndex(d=>d.date===date)+1;
      const fcDays=Math.min(Math.max(dayNum+1,2),7);
      const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?${base}&hourly=apparent_temperature,dewpoint_2m,wind_gusts_10m,et0_fao_evapotranspiration,relativehumidity_2m&forecast_days=${fcDays}`);
      if(r.ok){
        const j=await r.json();
        const times=j.hourly?.time||[];
        // Tijdstring normaliseren: vergelijk eerste 16 chars (YYYY-MM-DDTHH:MM)
        const hTime=h.time.slice(0,16);
        const idx=times.findIndex(t=>t.slice(0,16)===hTime);
        console.log('IFS detail: zoek',hTime,'in',times.length,'tijden, gevonden op idx:',idx);
        if(idx>=0){
          h.feelsLike=j.hourly.apparent_temperature?.[idx]!=null?Math.round(j.hourly.apparent_temperature[idx]):null;
          h.dewpoint=j.hourly.dewpoint_2m?.[idx]!=null?Math.round(j.hourly.dewpoint_2m[idx]):null;
          h.gusts=j.hourly.wind_gusts_10m?.[idx]!=null?Math.round(j.hourly.wind_gusts_10m[idx]):null;
          h.et0h=j.hourly.et0_fao_evapotranspiration?.[idx]!=null?r1(j.hourly.et0_fao_evapotranspiration[idx]):null;
          h.humidity=j.hourly.relativehumidity_2m?.[idx]!=null?Math.round(j.hourly.relativehumidity_2m[idx]):null;
        }
      }
    }catch(e){console.warn('IFS detail laden mislukt:',e.message);}
    renderHD();
  }
}

function degToCompass(d){if(d==null)return'—';const dirs=['N','NNO','NO','ONO','O','OZO','ZO','ZZO','Z','ZZW','ZW','WZW','W','WNW','NW','NNW'];return dirs[Math.round(d/22.5)%16];}
function degToArrow(d){if(d==null)return'';const r=(d+180)%360;return`<span style="display:inline-block;transform:rotate(${r}deg);font-size:calc(12px*var(--fz))">↑</span>`;}

async function openDagDetailPopup(date){
  const d=S.data.days.find(d=>d.date===date);
  if(!d) return;
  const dayIdx=S.data.days.indexOf(d);
  const useHarm=d.useHarm;
  const DAYS=tDays();
  const dt=new Date(date+'T12:00:00');
  const dagNaam=`${DAYS[dt.getDay()]} ${dt.getDate()}/${dt.getMonth()+1}`;

  // Open popup met laadindicator
  document.getElementById('hourlyOverlay').style.display='flex';
  document.getElementById('hourlyPopup').style.display='block';
  document.body.style.overflow='hidden';
  document.querySelector('#hourlyPopup .hourly-scroll').innerHTML=
    `<div style="padding:2rem;font-family:var(--mono);font-size:calc(13px*var(--fz));color:var(--muted)"><span class="spinner"></span> ${t('dataLoading')}</div>`;
  document.querySelector('#hourlyPopup span[style*="uppercase"]').textContent=
    `${dagNaam} · ${useHarm?'HARMONIE':dayIdx<=3?'IFS':'IFS + ENS'}`;

  // Bewaar originele allHours
  const origHours=S.data.allHours;
  const origHi=S.hi;
  const origFuture=S.data.futureHours;

  let dagHours=[];

  if(useHarm){
    // Dag 0: HARMONIE futureHours + OBS pastHours van vandaag
    const futureDag=S.data.futureHours.filter(h=>h.time.slice(0,10)===date).map(h=>({...h,isPast:false}));
    if(dayIdx===0){
      // Voeg gemeten uren toe (OBS pastHours die op deze dag vallen)
      const pastDag=S.data.pastHours.filter(h=>h.time.slice(0,10)===date);
      dagHours=[...pastDag,...futureDag];
    } else {
      dagHours=futureDag;
    }
  } else {
    // Dag 2+: gebruik gecachete hresHoursByDay of laad per dag
    const cached=S.data.hresHoursByDay?.[date];
    if(cached&&cached.length){
      dagHours=cached.map(h=>({
        time:h.time, hour:h.hour, temp:null,
        precip:h.precip, wmo:h.wmo, wind:null, windDir:null,
        humidity:null, sunMin:isHourDay(h.time,S.lat)?30:0,
        isPast:false, isDay:isHourDay(h.time,S.lat),
        feelsLike:null, dewpoint:null, gusts:null, pressure:null, et0h:null,
      }));
    }
    // Haal altijd verse IFS uurdata op voor deze dag (temp + wind ontbreken in cache)
    const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
    const dayNum=S.data.days.findIndex(d=>d.date===date)+1; // forecast_days offset
    if(dayNum>0){
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?${base}&hourly=temperature_2m,precipitation,weather_code,windspeed_10m,winddirection_10m,sunshine_duration&forecast_days=${Math.min(dayNum+1,7)}`);
        if(r.ok){
          const j=await r.json();
          const ht=j.hourly?.time||[];
          const dayHoursRaw=ht.map((t,i)=>({
            time:t,
            hour:parseInt(t.slice(11,13)),
            temp:j.hourly.temperature_2m?.[i]!=null?Math.round(j.hourly.temperature_2m[i]):null,
            precip:j.hourly.precipitation?.[i]!=null?r1(j.hourly.precipitation[i]):0,
            wmo:j.hourly.weather_code?.[i]??0,
            wind:j.hourly.windspeed_10m?.[i]!=null?Math.round(j.hourly.windspeed_10m[i]):null,
            windDir:j.hourly.winddirection_10m?.[i]!=null?Math.round(j.hourly.winddirection_10m[i]):null,
            sunMin:j.hourly.sunshine_duration?.[i]!=null?Math.round(j.hourly.sunshine_duration[i]/60):null,
            humidity:null, isPast:false, isDay:isHourDay(t,S.lat),
            feelsLike:null, dewpoint:null, gusts:null, pressure:null, et0h:null,
          })).filter(h=>h.time.slice(0,10)===date);
          if(dayHoursRaw.length) dagHours=dayHoursRaw;
        }
      }catch(e){console.warn('IFS dag detail laden mislukt:',e.message);}
    }
  }

  if(!dagHours.length){
    document.querySelector('#hourlyPopup .hourly-scroll').innerHTML=
      `<div style="padding:1rem;font-family:var(--mono);font-size:calc(13px*var(--fz));color:var(--muted)">${t('noIfsHour')}</div>`;
    return;
  }

  // Vervang tijdelijk allHours + futureHours met dag data
  S._dagDetailBron=useHarm?'HARMONIE-AROME':dayIdx<=3?'IFS':'IFS';
  S.data.allHours=dagHours;
  S.data.futureHours=dagHours;
  S.hi=0;

  renderHourly();
  renderMeteogram();

  // Herstel na sluiten
  const origClose=window._dagDetailCleanup;
  window._dagDetailCleanup=()=>{
    S.data.allHours=origHours;
    S.data.futureHours=origFuture;
    S.hi=origHi;
    S._dagDetailBron=null;
    window._dagDetailCleanup=origClose;
  };
}

function closeDagDetailPopup(){
  closeHourlyPopup();
  if(window._dagDetailCleanup) window._dagDetailCleanup();
}

// Cache voor lazy uurdata per dag
const _dagUurCache={};
function _dagCacheKey(date,type){return date+'_'+type;}
async function renderVochtDayPopup(d){
  console.log('renderVochtDayPopup:', d?.date, 'harmRhMin:', d?.harmRhMin, 'hresRhMin:', d?.hresRhMin);
  const dayIdx=S.data.days.indexOf(d);
  const useHarm=d.useHarm;
  const forceIfs=!useHarm&&dayIdx<=3;
  const inRange=(val,lo,hi)=>val!=null&&lo!=null&&hi!=null&&val>=lo&&val<=hi;
  const useRhMin=useHarm?d.harmRhMin!=null:(forceIfs?d.hresRhMin!=null:inRange(d.hresRhMin,d.humidityP10,d.humidityP90));
  const useRhMax=useHarm?d.harmRhMax!=null:(forceIfs?d.hresRhMax!=null:inRange(d.hresRhMax,d.humidityP10,d.humidityP90));
  const rhMin=useHarm?(d.harmRhMin??d.humidityMedian??0):(useRhMin?d.hresRhMin:d.humidityP10??0);
  const rhMax=useHarm?(d.harmRhMax??d.humidityMedian??100):(useRhMax?d.hresRhMax:d.humidityP90??100);
  const bronLabel=useHarm?'HARMONIE':(forceIfs?'IFS':'IFS/ENS P50');
  const scaleMin=Math.max(0,(d.humidityP10??rhMin)-5);
  const scaleMax=Math.min(100,(d.humidityP90??rhMax)+5);
  const pos=v=>Math.max(0,Math.min(100,(v-scaleMin)/(scaleMax-scaleMin)*100));
  const dagBalk=`
    <div style="padding:14px 18px 10px">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${t('tabHumidity')} · ENS spreiding + ${bronLabel}</div>
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--red);margin-bottom:4px">Min vochtigheid</div>
      <div style="position:relative;height:calc(18px*var(--fz));margin-bottom:2px">
        <span style="position:absolute;left:${pos(rhMin)}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--red);font-weight:700">${rhMin}%</span>
      </div>
      <div onclick="toggleTempDetail('vochtMinDetail')" style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(12px*var(--fz));cursor:pointer">
        <div style="position:absolute;left:${pos(d.humidityP10??rhMin)}%;width:${Math.max(pos(d.humidityP90??rhMin)-pos(d.humidityP10??rhMin),1)}%;height:100%;background:rgba(248,113,113,.2);border-radius:4px"></div>
        <div style="position:absolute;left:${pos(d.humidityP25??d.humidityP10??rhMin)}%;width:${Math.max(pos(d.humidityP75??d.humidityP90??rhMin)-pos(d.humidityP25??d.humidityP10??rhMin),1)}%;height:100%;background:rgba(248,113,113,.45);border-radius:4px"></div>
        <div style="position:absolute;left:calc(${pos(d.humidityMedian??rhMin)}% - 0.5px);width:1px;height:100%;background:rgba(248,113,113,.7)"></div>
        <div style="position:absolute;left:calc(${pos(rhMin)}% - 4px);top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--red);border-radius:50%"></div>
      </div>
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--accent);margin-bottom:4px">Max vochtigheid</div>
      <div style="position:relative;height:calc(18px*var(--fz));margin-bottom:2px">
        <span style="position:absolute;left:${pos(rhMax)}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--accent);font-weight:700">${rhMax}%</span>
      </div>
      <div onclick="toggleTempDetail('vochtMaxDetail')" style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(12px*var(--fz));cursor:pointer">
        <div style="position:absolute;left:${pos(d.humidityP10??rhMax)}%;width:${Math.max(pos(d.humidityP90??rhMax)-pos(d.humidityP10??rhMax),1)}%;height:100%;background:rgba(96,165,250,.2);border-radius:4px"></div>
        <div style="position:absolute;left:${pos(d.humidityP25??d.humidityP10??rhMax)}%;width:${Math.max(pos(d.humidityP75??d.humidityP90??rhMax)-pos(d.humidityP25??d.humidityP10??rhMax),1)}%;height:100%;background:rgba(96,165,250,.45);border-radius:4px"></div>
        <div style="position:absolute;left:calc(${pos(d.humidityMedian??rhMax)}% - 0.5px);width:1px;height:100%;background:rgba(96,165,250,.7)"></div>
        <div style="position:absolute;left:calc(${pos(rhMax)}% - 4px);top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--accent);border-radius:50%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted)">
        <span>${Math.round(scaleMin)}%</span>
        <span>${t('spread')}</span>
        <span>${Math.round(scaleMax)}%</span>
      </div>
      <!-- Detail panels: verschijnen bij klikken op balk -->
      <div id="vochtMinDetail" style="display:none;margin-top:10px;background:var(--surface2);border-radius:10px;padding:10px 14px">
        <div style="display:flex;gap:12px;font-family:var(--mono);font-size:calc(12px*var(--fz));flex-wrap:wrap">
          <span style="color:var(--muted)">P50: <span style="color:var(--red);font-weight:700">${d.humidityMedian??'—'}%</span></span>
          <span style="color:var(--muted)">P25–P75: <span style="color:var(--red)">${d.humidityP25??'—'}%–${d.humidityP75??'—'}%</span></span>
          <span style="color:var(--muted)">P10–P90: <span style="color:var(--red)">${d.humidityP10??'—'}%–${d.humidityP90??'—'}%</span></span>
        </div>
      </div>
      <div id="vochtMaxDetail" style="display:none;margin-top:10px;background:var(--surface2);border-radius:10px;padding:10px 14px">
        <div style="display:flex;gap:12px;font-family:var(--mono);font-size:calc(12px*var(--fz));flex-wrap:wrap">
          <span style="color:var(--muted)">P50: <span style="color:var(--accent);font-weight:700">${d.humidityMedian??'—'}%</span></span>
          <span style="color:var(--muted)">P25–P75: <span style="color:var(--accent)">${d.humidityP25??'—'}%–${d.humidityP75??'—'}%</span></span>
          <span style="color:var(--muted)">P10–P90: <span style="color:var(--accent)">${d.humidityP10??'—'}%–${d.humidityP90??'—'}%</span></span>
        </div>
      </div>
    </div>`;
  const harmHoursV=S.data.futureHours.filter(h=>h.time.slice(0,10)===d.date);
  const obsHoursV=useHarm&&dayIdx===0?S.data.pastHours.filter(h=>h.time.slice(0,10)===d.date).map(h=>({...h,isPast:true})):[];
  let forecastHoursV;
  if(useHarm){
    forecastHoursV=harmHoursV.map(h=>({...h,isPast:false}));
  } else {
    const cacheKey=_dagCacheKey(d.date,'vocht');
    if(!_dagUurCache[cacheKey]){
      const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?${base}&hourly=temperature_2m,dewpoint_2m,weather_code&forecast_days=${Math.min(dayIdx+2,7)}`);
        if(r.ok){
          const j=await r.json();
          const magnus=(T,Td)=>T!=null&&Td!=null?Math.min(100,Math.round(100*Math.exp(17.625*Td/(243.04+Td))/Math.exp(17.625*T/(243.04+T)))):null;
          _dagUurCache[cacheKey]=(j.hourly?.time||[])
            .map((t,i)=>({time:t,hour:parseInt(t.slice(11,13)),
              humidity:magnus(j.hourly.temperature_2m?.[i],j.hourly.dewpoint_2m?.[i]),
              wmo:j.hourly.weather_code?.[i]??0,isPast:false}))
            .filter(h=>h.time.slice(0,10)===d.date);
        }
      }catch(e){console.warn('IFS vocht uur mislukt:',e.message);}
    }
    forecastHoursV=_dagUurCache[cacheKey]||[];
  }
  const dagHoursV=[...obsHoursV,...forecastHoursV];
  const uurHtml=dagHoursV.length?`<div style="border-top:1px solid var(--border)">
    <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:10px 18px 4px">${t('perHour')} · ${useHarm?'HARMONIE-AROME':'IFS'}</div>
    ${dagHoursV.map((h,i)=>`<div style="display:grid;grid-template-columns:44px 1fr 28px 1fr auto;align-items:center;padding:9px 18px;${i<dagHoursV.length-1?'border-bottom:1px solid var(--border)':''}${h.isPast?';opacity:.5':''}">
      <span style="font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:600;color:var(--muted)">${h.time.slice(11,16)}</span>
      <span></span><span style="font-size:calc(20px*var(--fz))">${wi(h.wmo??0,isHourDay(h.time,S.lat),20)}</span><span></span>
      <span style="font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:700;color:var(--accent)">${h.humidity!=null?h.humidity+'%':'—'}${h.isPast?'<span style="font-size:calc(11px*var(--fz));color:var(--muted)"> '+t('measurement')+'</span>':''}</span>
    </div>`).join('')}
  </div>`:'';
  const vochtGrafiek=buildLineGrafiek(dagHoursV,h=>h.humidity,'var(--accent)',t('tabHumidity'),'%',useHarm?'HARMONIE-AROME':'IFS');
  document.getElementById('dayPopupBody').innerHTML=dagBalk+vochtGrafiek+uurHtml;
}

async function renderWindDayPopup(d){

  const forceIfs=!useHarm&&dayIdx<=3;
  const inRange=(val,lo,hi)=>val!=null&&lo!=null&&hi!=null&&val>=lo&&val<=hi;

  const windVal=useHarm?(d.harmWindMax??d.windP50):(useWind?d.hresWindMax:d.windP50);
  const windDir=d.hresWindDir??d.windDir;
  const bronLabel=useHarm?'HARMONIE':(forceIfs?'IFS':'IFS/ENS P50');
  const allP10=S.data.days.map(d=>d.windP10??0);
  const allP90=S.data.days.map(d=>d.windP90??0);

  const scaleMax=Math.max(...allP90)+5;

        <div style="position:absolute;left:${pos(d.windP25??windVal)}%;width:${Math.max(pos(d.windP75??windVal)-pos(d.windP25??windVal),1)}%;height:100%;background:rgba(128,128,128,.45);border-radius:4px"></div>
        <div style="position:absolute;left:calc(${pos(d.windP50??windVal)}% - 0.5px);width:1px;height:100%;background:rgba(128,128,128,.7)"></div>
        <div style="position:absolute;left:calc(${pos(windVal)}% - 4px);top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--muted);border-radius:50%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted)">
        <span>${fmtWind(Math.round(scaleMin))}</span>
        <span>ENS P10–P90</span>
        <span>${fmtWind(Math.round(scaleMax))}</span>
      </div>
      <div id="windDetail" style="display:none;margin-top:10px;background:var(--surface2);border-radius:10px;padding:10px 14px">
        <div style="display:flex;gap:12px;font-family:var(--mono);font-size:calc(12px*var(--fz));flex-wrap:wrap">
          <span style="color:var(--muted)">P50: <span style="color:var(--text);font-weight:700">${fmtWind(d.windP50)}</span></span>
          <span style="color:var(--muted)">P25–P75: <span style="color:var(--text)">${fmtWind(d.windP25)}–${fmtWind(d.windP75)}</span></span>
          <span style="color:var(--muted)">P10–P90: <span style="color:var(--text)">${fmtWind(d.windP10)}–${fmtWind(d.windP90)}</span></span>

  let forecastHoursW;
  if(useHarm){
    forecastHoursW=harmHoursW.map(h=>({...h,isPast:false}));
  } else {
    const cacheKey=_dagCacheKey(d.date,'wind');
    if(!_dagUurCache[cacheKey]){
      const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?${base}&hourly=windspeed_10m,winddirection_10m,wind_gusts_10m,weather_code&forecast_days=${Math.min(dayIdx+2,7)}`);
        if(r.ok){
          const j=await r.json();
          _dagUurCache[cacheKey]=(j.hourly?.time||[])
            .map((t,i)=>({time:t,hour:parseInt(t.slice(11,13)),
              wind:j.hourly.windspeed_10m?.[i]!=null?Math.round(j.hourly.windspeed_10m[i]):null,
              windDir:j.hourly.winddirection_10m?.[i]!=null?Math.round(j.hourly.winddirection_10m[i]):null,
              gusts:j.hourly.wind_gusts_10m?.[i]!=null?Math.round(j.hourly.wind_gusts_10m[i]):null,
              wmo:j.hourly.weather_code?.[i]??0,isPast:false}))
            .filter(h=>h.time.slice(0,10)===d.date);
        }
      }catch(e){console.warn('IFS wind uur mislukt:',e.message);}
    }
    forecastHoursW=_dagUurCache[cacheKey]||[];
  }
  const dagHoursW=[...obsHoursW,...forecastHoursW];
  const uurHtml=dagHoursW.length?`<div style="border-top:1px solid var(--border)">

      <span style="font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:600;color:var(--muted)">${h.time.slice(11,16)}</span>
      <span></span><span style="font-size:calc(20px*var(--fz))">${wi(h.wmo??0,isHourDay(h.time,S.lat),20)}</span><span></span>
      <span style="font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:700;color:var(--muted);display:flex;align-items:center;gap:4px">${degToArrow(h.windDir??null)}<span>${fmtWind(h.wind)}</span></span>
      <span></span>
      <span style="font-family:var(--mono);font-size:calc(13px*var(--fz));color:var(--muted)">${h.gusts!=null?fmtWind(h.gusts)+'↑':'—'}${h.isPast?'<span style="font-size:calc(11px*var(--fz));color:var(--muted)"> '+t('measurement')+'</span>':''}</span>
    </div>`).join('')}
  </div>`:'';
  const windGrafiek=buildLineGrafiek(dagHoursW,h=>convWindVal(h.wind),'var(--muted)',t('windspeed'),windUnit(),useHarm?(dayIdx===0?'OBS + HARMONIE-AROME':'HARMONIE-AROME'):'IFS',h=>h.gusts!=null?convWindVal(h.gusts):null);
  document.getElementById('dayPopupBody').innerHTML=dagBalk+windGrafiek+uurHtml;
}

async function renderZonDayPopup(d){
  function daylightHours(dateStr,lat){
    const dt=new Date(dateStr+'T12:00:00');
    const doy=Math.floor((dt-new Date(dt.getFullYear(),0,0))/(864e5));
    const phi=lat*Math.PI/180;
    const delta=0.409*Math.sin(2*Math.PI/365*doy-1.39);
    const cosH0=-Math.tan(phi)*Math.tan(delta);
    if(cosH0<=-1)return 24; if(cosH0>=1)return 0;
    return 2*Math.acos(cosH0)*12/Math.PI;
  }
  const maxSun=r1(daylightHours(d.date,S.lat));
  const sh=d.sunHours??0;
  const et0=d.et0??null;
  const sunPct=Math.min(sh/maxSun*100,100);
  const allEt0=S.data.days.map(d=>d.et0??0);
  const et0Max=Math.max(...allEt0,4)+1;
  const et0Pct=et0!=null?Math.min(et0/et0Max*100,100):0;
  const dagBalk=`
    <div style="padding:14px 18px 10px">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px">${t('tabSun')} · SunURL model</div>
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--amber);margin-bottom:4px">☀ ${t('sunHours')}</div>
      <div style="position:relative;height:18px;margin-bottom:4px">
        <span style="position:absolute;left:${sunPct}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--amber);font-weight:700">${sh} u</span>
      </div>
      <div style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(8px*var(--fz))">
        <div style="position:absolute;left:0;width:${sunPct}%;height:100%;background:var(--amber);opacity:.5;border-radius:4px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);margin-bottom:16px">
        <span>0 u</span><span>Max daglicht: ${maxSun} u</span>
      </div>
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:rgba(52,199,89,.9);margin-bottom:4px">${t('evap')}</div>
      <div style="position:relative;height:18px;margin-bottom:4px">
        <span style="position:absolute;left:${et0Pct}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:rgba(52,199,89,.9);font-weight:700">${et0??'—'} mm</span>
      </div>
      <div style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(8px*var(--fz))">
        <div style="position:absolute;left:0;width:${et0Pct}%;height:100%;background:rgba(52,199,89,.5);border-radius:4px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted)">
        <span>0 mm</span><span>Max: ${r1(et0Max)} mm</span>
      </div>
    </div>`;
  const harmHoursZ=S.data.futureHours.filter(h=>h.time.slice(0,10)===d.date);
  const obsHoursZ=S.data.days.indexOf(d)===0?S.data.pastHours.filter(h=>h.time.slice(0,10)===d.date).map(h=>({...h,isPast:true})):[];
  let forecastHoursZ;
  if(harmHoursZ.length){
    forecastHoursZ=harmHoursZ.map(h=>({...h,isPast:false}));
  } else {
    const cacheKey=_dagCacheKey(d.date,'zon');
    if(!_dagUurCache[cacheKey]){
      const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/forecast?${base}&hourly=sunshine_duration,et0_fao_evapotranspiration,weathercode&forecast_days=7`);
        if(r.ok){
          const j=await r.json();
          _dagUurCache[cacheKey]=(j.hourly?.time||[])
            .map((t,i)=>({time:t,hour:parseInt(t.slice(11,13)),
              sunMin:j.hourly.sunshine_duration?.[i]!=null?Math.round(j.hourly.sunshine_duration[i]/60):0,
              et0h:j.hourly.et0_fao_evapotranspiration?.[i]!=null?r1(j.hourly.et0_fao_evapotranspiration[i]):null,
              wmo:j.hourly.weathercode?.[i]??0,isPast:false}))
            .filter(h=>h.time.slice(0,10)===d.date);
        }
      }catch(e){console.warn('Sun uur mislukt:',e.message);}
    }
    forecastHoursZ=_dagUurCache[cacheKey]||[];
  }
  const dagHoursZ=[...obsHoursZ,...forecastHoursZ];
  const bronZonLabel=harmHoursZ.length?'HARMONIE cloudcover':'Sun model';
  const uurHtml=dagHoursZ.length?`<div style="border-top:1px solid var(--border)">
    <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:10px 18px 4px">Zonminuten per uur · ${bronZonLabel}</div>
