async function renderTempDayPopup(d){
  const dayIdx=S.data.days.indexOf(d);
  const useHarm=d.useHarm;
  const forceIfs=!useHarm&&dayIdx<=3;
  const inRange=(val,lo,hi)=>val!=null&&lo!=null&&hi!=null&&val>=lo&&val<=hi;
  const useTMin=useHarm?d.harmTempMin!=null:(forceIfs||inRange(d.hresTempMin,d.tempMinP10,d.tempMinP90));
  const useTMax=useHarm?d.harmTempMax!=null:(forceIfs||inRange(d.hresTempMax,d.tempMaxP10,d.tempMaxP90));
  const tMin=useHarm?(d.harmTempMin??d.tempMinP50):(useTMin?d.hresTempMin:d.tempMinP50);
  const tMax=useHarm?(d.harmTempMax??d.tempMaxP50):(useTMax?d.hresTempMax:d.tempMaxP50);
  const bronLabel=useHarm?'HARMONIE':(forceIfs?'IFS':'IFS/ENS P50');
  const s='<sup style="font-size:calc(8px*var(--fz));opacity:.55">~</sup>';

  // Aparte schalen per balk voor betere zichtbaarheid
  const minScale={lo:(d.tempMinP10??tMin)-2, hi:(d.tempMinP90??tMin)+2};
  const maxScale={lo:(d.tempMaxP10??tMax)-2, hi:(d.tempMaxP90??tMax)+2};
  minScale.rng=Math.max(minScale.hi-minScale.lo,1);
  maxScale.rng=Math.max(maxScale.hi-maxScale.lo,1);
  const posMin=v=>Math.max(0,Math.min(100,(v-minScale.lo)/minScale.rng*100));
  const posMax=v=>Math.max(0,Math.min(100,(v-maxScale.lo)/maxScale.rng*100));
  // Gecombineerde schaal voor labels
  const scaleMin=Math.min(d.tempMinP10??tMin,tMin)-2;
  const scaleMax=Math.max(d.tempMaxP90??tMax,tMax)+2;
  const scaleRng=Math.max(scaleMax-scaleMin,1);
  const pos=v=>Math.max(0,Math.min(100,(v-scaleMin)/scaleRng*100));

  const minP10x=posMin(d.tempMinP10??tMin), minP90x=posMin(d.tempMinP90??tMin);
  const maxP10x=posMax(d.tempMaxP10??tMax), maxP90x=posMax(d.tempMaxP90??tMax);
  const tMinX=posMin(tMin), tMaxX=posMax(tMax);

  const dagBalk=`
    <div style="padding:14px 18px 10px">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Temperatuur · ENS spreiding + ${bronLabel}</div>
      <!-- Min temp balk -->
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--accent);margin-bottom:4px">${t('minTemp')}</div>
      <div style="position:relative;height:calc(18px*var(--fz));margin-bottom:2px">
        <span style="position:absolute;left:${tMinX}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--accent);font-weight:700;white-space:nowrap">${fmtTempShort(tMin)}${!useTMin?s:''}</span>
      </div>
      <div onclick="toggleTempDetail('tempMinDetail')" style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(12px*var(--fz));cursor:pointer">
        <div style="position:absolute;left:${minP10x}%;width:${Math.max(minP90x-minP10x,1)}%;height:100%;background:rgba(96,165,250,.2);border-radius:4px"></div>
        <div style="position:absolute;left:${posMin(d.tempMinP25??d.tempMinP10??tMin)}%;width:${Math.max(posMin(d.tempMinP75??d.tempMinP90??tMin)-posMin(d.tempMinP25??d.tempMinP10??tMin),1)}%;height:100%;background:rgba(96,165,250,.45);border-radius:4px"></div>
        <div style="position:absolute;left:calc(${posMin(d.tempMinP50??tMin)}% - 0.5px);width:1px;height:100%;background:rgba(96,165,250,.7)"></div>
        <div style="position:absolute;left:calc(${tMinX}% - 4px);top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--accent);border-radius:50%"></div>
      </div>
      <!-- Max temp balk -->
      <div style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--red);margin-bottom:4px">${t('maxTemp')}</div>
      <div style="position:relative;height:calc(18px*var(--fz));margin-bottom:2px">
        <span style="position:absolute;left:${tMaxX}%;transform:translateX(-50%);font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--red);font-weight:700;white-space:nowrap">${fmtTempShort(tMax)}${!useTMax?s:''}</span>
      </div>
      <div onclick="toggleTempDetail('tempMaxDetail')" style="position:relative;height:calc(12px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;margin-bottom:calc(12px*var(--fz));cursor:pointer">
        <div style="position:absolute;left:${maxP10x}%;width:${Math.max(maxP90x-maxP10x,1)}%;height:100%;background:rgba(248,113,113,.2);border-radius:4px"></div>
        <div style="position:absolute;left:${posMax(d.tempMaxP25??d.tempMaxP10??tMax)}%;width:${Math.max(posMax(d.tempMaxP75??d.tempMaxP90??tMax)-posMax(d.tempMaxP25??d.tempMaxP10??tMax),1)}%;height:100%;background:rgba(248,113,113,.45);border-radius:4px"></div>
        <div style="position:absolute;left:calc(${posMax(d.tempMaxP50??tMax)}% - 0.5px);width:1px;height:100%;background:rgba(248,113,113,.7)"></div>
        <div style="position:absolute;left:calc(${tMaxX}% - 4px);top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--red);border-radius:50%"></div>
      </div>
      <!-- Schaal -->
      <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted)">
        <span>${fmtTempShort(Math.round(scaleMin))}</span>
        <span style="font-size:calc(10px*var(--fz))">${t('spread')}</span>
        <span>${fmtTempShort(Math.round(scaleMax))}</span>
      </div>
      <!-- Detail panels: verschijnen bij klikken op balk -->
      <div id="tempMinDetail" style="display:none;margin-top:10px;background:var(--surface2);border-radius:10px;padding:10px 14px">
        <div style="display:flex;gap:12px;font-family:var(--mono);font-size:calc(12px*var(--fz));flex-wrap:wrap">
          <span style="color:var(--muted)">P50: <span style="color:var(--accent);font-weight:700">${fmtTempShort(d.tempMinP50)}</span></span>
          <span style="color:var(--muted)">P25–P75: <span style="color:var(--accent)">${fmtTempShort(d.tempMinP25)}–${fmtTempShort(d.tempMinP75)}</span></span>
          <span style="color:var(--muted)">P10–P90: <span style="color:var(--accent)">${fmtTempShort(d.tempMinP10)}–${fmtTempShort(d.tempMinP90)}</span></span>
        </div>
      </div>
      <div id="tempMaxDetail" style="display:none;margin-top:10px;background:var(--surface2);border-radius:10px;padding:10px 14px">
        <div style="display:flex;gap:12px;font-family:var(--mono);font-size:calc(12px*var(--fz));flex-wrap:wrap">
          <span style="color:var(--muted)">P50: <span style="color:var(--red);font-weight:700">${fmtTempShort(d.tempMaxP50)}</span></span>
          <span style="color:var(--muted)">P25–P75: <span style="color:var(--red)">${fmtTempShort(d.tempMaxP25)}–${fmtTempShort(d.tempMaxP75)}</span></span>
          <span style="color:var(--muted)">P10–P90: <span style="color:var(--red)">${fmtTempShort(d.tempMinP10)}–${fmtTempShort(d.tempMaxP90)}</span></span>
        </div>
      </div>
    </div>`;

  // Uurlijst: gebruik IFS of HARMONIE uurdata
  const harmHours=S.data.futureHours.filter(h=>h.time.slice(0,10)===d.date);
  const ifsHoursRaw=S.data.hresHoursByDay?.[d.date]||[];
  const obsHours=useHarm&&dayIdx===0
    ?S.data.pastHours.filter(h=>h.time.slice(0,10)===d.date).map(h=>({...h,isPast:true}))
    :[];
  let forecastHours;
  if(useHarm){
    forecastHours=harmHours.map(h=>({...h,isPast:false}));
  } else {
    const cacheKey=_dagCacheKey(d.date,'temp');
    if(!_dagUurCache[cacheKey]){
      const base=`latitude=${S.lat}&longitude=${S.lon}&timezone=auto`;
      try{
        const r=await fetch(`https://api.open-meteo.com/v1/ecmwf?${base}&hourly=temperature_2m,weather_code&forecast_days=${Math.min(dayIdx+2,7)}`);
        if(r.ok){
          const j=await r.json();
          _dagUurCache[cacheKey]=(j.hourly?.time||[])
            .map((t,i)=>({time:t,hour:parseInt(t.slice(11,13)),
              temp:j.hourly.temperature_2m?.[i]!=null?Math.round(j.hourly.temperature_2m[i]):null,
              wmo:j.hourly.weather_code?.[i]??0,isPast:false}))
            .filter(h=>h.time.slice(0,10)===d.date);
        }
      }catch(e){console.warn('IFS temp uur mislukt:',e.message);}
    }
    forecastHours=_dagUurCache[cacheKey]||ifsHoursRaw.map(h=>({...h,isPast:false,temp:null}));
  }
  const dagHours=[...obsHours,...forecastHours];
  const bronUurLabel=useHarm?(dayIdx===0?'OBS + HARMONIE-AROME':'HARMONIE-AROME'):'IFS';

  let uurHtml='';
  if(dagHours.length){
    uurHtml=`<div style="border-top:1px solid var(--border)">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:10px 18px 4px">${t('perHour')} · ${bronUurLabel}</div>
      ${dagHours.map((h,i)=>{
        const hhmm=h.time.slice(11,16);
        const isd=isHourDay(h.time,S.lat);
        const temp=h.temp??null;
        return`<div style="display:grid;grid-template-columns:44px 1fr 28px 1fr auto;align-items:center;padding:9px 18px;${i<dagHours.length-1?'border-bottom:1px solid var(--border)':''}${h.isPast?';opacity:.5':''}">
          <span style="font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:600;color:var(--muted)">${hhmm}</span>
          <span></span>
          <span style="font-size:calc(20px*var(--fz))">${wi(h.wmo??0,isd,20)}</span>
          <span></span>
          <span style="font-family:var(--mono);font-size:calc(15px*var(--fz));font-weight:700;color:${h.isPast?'var(--muted)':'var(--amber)'}">
            ${temp!=null?fmtTempShort(temp):'—'}${h.isPast?'<span style="font-family:var(--mono);font-size:calc(11px*var(--fz));color:var(--muted)"> '+t('measurement')+'</span>':''}
          </span>
        </div>`;
      }).join('')}
    </div>`;
  }

  const tempVals=dagHours.map(h=>h.temp);
  console.log('temp dagHours:', dagHours.length, 'temp vals:', tempVals.slice(0,5), 'eerste uur:', dagHours[0]?.time);
  const tempGrafiek=buildLineGrafiek(dagHours,h=>convTempVal(h.temp),'var(--amber)',t('temp'),tempUnit(),bronUurLabel);
  document.getElementById('dayPopupBody').innerHTML=dagBalk+tempGrafiek+uurHtml;
}

async function renderNeerslagDayPopup(d){
  const dayIdx=S.data.days.indexOf(d);
  const useHarm=d.useHarm; // dag 0-1: HARMONIE
  const forceIfs=!useHarm&&dayIdx<=3; // dag 2-3: altijd IFS
  // Gebruik dezelfde waarde als neerslag tab rij
  const usePrecip=useHarm?d.harmPrecip!=null:(forceIfs||(d.hresPrecip!=null&&d.hresPrecip>=d.precipP10&&d.hresPrecip<=d.precipP90));
  const ifsVal=Number(useHarm?(d.harmPrecip??0):(usePrecip&&d.hresPrecip!=null?d.hresPrecip:d.precipMedian??0));
  const bronLabel=useHarm?'HARMONIE':(forceIfs?'IFS':'IFS/ENS P50');

  // Uurdata: HARMONIE voor dag 0-1, IFS hresHoursByDay voor dag 2+
  // Voor dag 0: ook gemeten OBS uren vooraan toevoegen
  const harmHours=S.data.futureHours.filter(h=>h.time.slice(0,10)===d.date);
  const ifsHoursRaw=S.data.hresHoursByDay?.[d.date]||[];
  const obsDagHours=(useHarm&&dayIdx===0)
    ?S.data.pastHours.filter(h=>h.time.slice(0,10)===d.date).map(h=>({
        time:h.time, hour:parseInt(h.time.slice(11,13)),
        precip:h.precip??0, wmo:h.wmo??0, is3h:false, isPast:true
      }))
    :[];
  console.log('neerslag popup dag:', d.date, 'dayIdx:', dayIdx, 'useHarm:', useHarm, 'obsHours:', obsDagHours.length, 'pastHours totaal:', S.data.pastHours.length);
  const ifsHoursForecast=useHarm?harmHours.map(h=>({
    time:h.time, hour:parseInt(h.time.slice(11,13)),
    precip:h.precip??0, wmo:h.wmo??0, is3h:false, isPast:false
  })):ifsHoursRaw.map(h=>({...h,isPast:false}));
  const ifsHours=[...obsDagHours,...ifsHoursForecast];
  const hasIfsHour=ifsHours.length>0;
  const bronUurLabel=useHarm?'HARMONIE-AROME':'IFS';

  // ── Uitleg tekst ──
  let uitlegTekst='';
  if(d.precipP25>0){
    uitlegTekst=`${d.pChance}% kans op neerslag · 75% kans op >${d.precipP25} mm · 10% kans op >${d.precipP90} mm`;
  } else {
    const pcts=[[10,d.precipP10],[25,d.precipP25],[50,d.precipMedian],[75,d.precipP75],[90,d.precipP90]];
    const first=pcts.find(([,v])=>v>0);
    if(first) uitlegTekst=`${d.pChance}% kans op neerslag · ${100-first[0]}% kans op >${first[1]} mm · 10% kans op >${d.precipP90} mm`;
    else uitlegTekst=`${d.pChance}% kans op neerslag · verwachte hoeveelheid nihil`;
  }

  // ── Dagsom balk: P0–P100 bereik ──
  const maxBalk=Math.max(d.precipP90??2, ifsVal, 2)+2;
  const pctBar=v=>Math.min((v??0)/maxBalk*100,100);
  const ifsPct=pctBar(ifsVal);
  const dagBalk=`
    <div style="padding:14px 18px 6px">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">Dagsom · ENS spreiding + ${bronLabel}</div>
      <div style="position:relative;height:28px;margin-bottom:4px">
        <span style="position:absolute;left:${ifsPct}%;transform:translateX(-50%);bottom:0;color:var(--accent);font-weight:700;font-size:calc(11px*var(--fz));font-family:var(--mono);white-space:nowrap">${ifsVal.toFixed(1)} mm${!usePrecip?'<sup style="font-size:calc(8px*var(--fz))">~</sup>':''}</span>
      </div>
      <div onclick="toggleDagBalkDetail(this,${d.precipP10},${d.precipP25},${d.precipP75??d.precipP90},${d.precipP90},${ifsVal.toFixed(1)})" style="position:relative;height:calc(16px*var(--fz));background:rgba(128,128,128,.13);border-radius:4px;cursor:pointer">
        <div style="position:absolute;left:${pctBar(d.precipP10)}%;width:${Math.max(pctBar(d.precipP90)-pctBar(d.precipP10),1)}%;height:100%;background:rgba(96,165,250,.2);border-radius:4px"></div>
        <div style="position:absolute;left:${pctBar(d.precipP25)}%;width:${Math.max(pctBar(d.precipP75??d.precipP90)-pctBar(d.precipP25),1)}%;height:100%;background:rgba(96,165,250,.45);border-radius:4px"></div>
        <div style="position:absolute;left:calc(${ifsPct}% - 4px);top:50%;transform:translateY(-50%);width:8px;height:8px;background:var(--accent);border-radius:50%"></div>
      </div>
      <div style="margin-top:4px"></div>
      <div id="dagBalkDetail" style="display:none;margin-top:8px;background:var(--surface2);border-radius:8px;padding:8px 12px;font-family:var(--mono);font-size:calc(11px*var(--fz))">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          <div><span style="color:var(--muted)">P50: </span><span style="color:var(--accent);font-weight:700">${(d.precipMedian??0).toFixed(1)} mm</span></div>
          <div><span style="color:var(--muted)">P25–P75: </span><span style="color:var(--accent)">${d.precipP25}–${d.precipP75??d.precipP90} mm</span></div>
          <div><span style="color:var(--muted)">P10–P90: </span><span style="color:var(--accent)">${d.precipP10}–${d.precipP90} mm</span></div>
        </div>
      </div>
      <div style="font-family:var(--sans);font-size:calc(12px*var(--fz));color:var(--muted);margin-top:8px;line-height:1.5">${uitlegTekst}</div>
    </div>`;

  // ENS percentielen lazy opgehaald voor deze dag (API call per dag)
  const ensDay=await getEnsForDay(d.date);
  const getEns=(timeStr)=>ensDay[timeStr]||{};

  // ── Staafgrafiek: ENS spreiding per uur + IFS stip ──
  let grafiekHtml='';
  if(hasIfsHour){
    const ifsMap={};
    ifsHours.forEach(h=>{ ifsMap[h.time.slice(11,16)]=h; });
    // Gebruik IFS uren als leidend (uurlijks of 3-uurlijks)
    const maxMm=Math.max(
      ...ifsHours.map(h=>h.precip??0),
      ...ifsHours.map(h=>getEns(h.time).precipP90??0),
      1
    )+2;
    const pct2=v=>Math.min((v??0)/maxMm*100,100);

    // As altijd vanaf 0, maar ENS balken beginnen bij P10 hoogte
    const pct2adj=v=>Math.min(Math.max((v??0)/maxMm*100,0),100);

    const bars=ifsHours.map((h,i)=>{
      const hhmm=h.time.slice(11,16);
      const ens=h.isPast?{}:getEns(h.time);
      const p10=pct2adj(ens.precipP10??0);
      const p25=pct2adj(ens.precipP25??0);
      const p75=pct2adj(ens.precipP75??0);
      const p90=pct2adj(ens.precipP90??0);
      const ifsPctAdj=pct2adj(h.precip??0);
      const showLbl=h.is3h?(h.hour%6===0):(h.hour%3===0);
      if(h.isPast){
        // OBS: grijze staaf, geen ENS spreiding
        return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0">
          <div style="width:100%;flex:1;position:relative;opacity:.5">

// Lazy ENS uurdata per dag: wordt pas opgehaald bij klikken neerslag popup
const ensHourCache={};
async function getEnsForDay(date){
  if(ensHourCache[date]) return ensHourCache[date];
  // Haal ENS uurdata op voor alleen deze dag
  const lat=S.lat, lon=S.lon;
  const url=`https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${lat}&longitude=${lon}&hourly=precipitation&models=ecmwf_ifs025&start_date=${date}&end_date=${date}&timezone=auto`;
  try {
    const r=await fetch(url);
    if(!r.ok) return {};
    const j=await r.json();
    const en=j.hourly||{}, et=en.time||[];
    function getM(pfx){return Object.keys(en).filter(k=>k.startsWith(pfx+'_member')).map(k=>en[k]);}
    const PM=getM('precipitation');
    const PM2=PM.length?PM:[en.precipitation||[]];
    const result={};
    for(let i=0;i<et.length;i++){
      const pa=PM2.map(m=>m[i]??0).sort((a,b)=>a-b);
      result[et[i]]={
        pChance:Math.round(pge(pa,.1)),
        precipP10:r1(pct(pa,10)),
        precipP25:r1(pct(pa,25)),
        precipP50:r1(pct(pa,50)),
        precipP75:r1(pct(pa,75)),
        precipP90:r1(pct(pa,90)),
      };
    }
    ensHourCache[date]=result;
    return result;
  } catch(e){ console.warn('ENS uur ophalen mislukt:', e); return {}; }
}

// Gladde curve (zoals Chart.js tension) — Catmull-Rom/Bézier met gewogen afstand
function smoothPath(pts, t){
  if(!pts.length) return '';
  if(pts.length<2) return `M${pts[0].x},${pts[0].y}`;
  t=t==null?0.35:t;
  let d=`M${pts[0].x},${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i];
    const p1=pts[i];
    const p2=pts[i+1];
    const p3=pts[i+2]||p2;
    const d01=Math.hypot(p1.x-p0.x,p1.y-p0.y);
    const d12=Math.hypot(p2.x-p1.x,p2.y-p1.y);
    const d23=Math.hypot(p3.x-p2.x,p3.y-p2.y);
    let s12a=d12/(d01+d12); if(!isFinite(s12a))s12a=0;
    let s12b=d12/(d12+d23); if(!isFinite(s12b))s12b=0;
    const fb=t*s12a, fa=t*s12b;
    const c1x=p1.x+fb*(p2.x-p0.x), c1y=p1.y+fb*(p2.y-p0.y);
    const c2x=p2.x-fa*(p3.x-p1.x), c2y=p2.y-fa*(p3.y-p1.y);
    d+=` C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2.x},${p2.y}`;
  }
  return d;
}

function buildLineGrafiek(dagHours, getValue, kleur, label, unit, bronLabel, getGust){
  if(!dagHours.length) return '';
  const vals=dagHours.map(getValue);
  const valid=vals.filter(v=>v!=null);
  if(!valid.length) return '';

  // Schaal inclusief gusts
  const gustVals=getGust?dagHours.map(getGust).filter(v=>v!=null):[];
  const allVals=[...valid,...gustVals];
  const vmin=Math.min(...allVals), vmax=Math.max(...allVals);
  const range=Math.max(vmax-vmin,1);
  const pad=range*0.15;
  const lo=vmin-pad, hi=vmax+pad, rng=hi-lo;
  const W=280, H=70;
  const x=(i)=>Math.round(i/(dagHours.length-1||1)*W);
  const y=(v)=>Math.round(H-(v-lo)/rng*H);

  const ptArr=dagHours.map((h,i)=>{
    const v=getValue(h);
    return v!=null?{x:x(i),y:y(v)}:null;
  }).filter(Boolean);
  const pathD=smoothPath(ptArr,0.35);

  const firstFuture=dagHours.findIndex(h=>!h.isPast);
  const splitX=firstFuture>0?x(firstFuture):0;
  const grafId='grafiek_'+Math.random().toString(36).slice(2,7);
  const tooltipId='tooltip_'+grafId;

  // Klikbare stippen
  const stippen=dagHours.map((h,i)=>{
    const v=getValue(h);
    if(v==null) return '';
    const gust=getGust?getGust(h):null;
    const gustStr=gust!=null?` stoten:${gust}${unit}`:'';
    return`<circle cx="${x(i)}" cy="${y(v)}" r="5" fill="transparent" stroke="transparent"
      onclick="showGrafiekTooltip('${tooltipId}','${h.time.slice(11,16)}',${v},'${unit}','${kleur}'${gust!=null?`,${gust}`:',null'})"
      style="cursor:pointer"/>
    <circle cx="${x(i)}" cy="${y(v)}" r="2.5" fill="${kleur}" opacity="${h.isPast?0.4:1}" pointer-events="none"/>`;
  }).join('');

  // Gust stippen (driehoekjes boven de lijn)
  const gustStippen=getGust?dagHours.map((h,i)=>{
    const g=getGust(h);
    if(g==null) return '';
    return`<circle cx="${x(i)}" cy="${y(g)}" r="3" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.6)" stroke-width="1.5" pointer-events="none"/>
    <line x1="${x(i)}" y1="${y(g)}" x2="${x(i)}" y2="${y(getValue(h)??g)}" stroke="rgba(255,255,255,.2)" stroke-width="1" stroke-dasharray="2,2" pointer-events="none"/>`;
  }).join(''):'';

  return`<div style="padding:0 18px 10px;border-bottom:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-family:var(--mono);font-size:calc(10px*var(--fz));color:var(--muted);letter-spacing:.08em;text-transform:uppercase">${label} per uur · ${bronLabel}</div>
      ${getGust?`<div style="font-family:var(--mono);font-size:calc(9px*var(--fz));color:var(--muted)">○ stoten</div>`:''}
    </div>
    <svg id="${grafId}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;aspect-ratio:${W}/${H};display:block;overflow:visible">
      ${firstFuture>0?`<rect x="0" y="0" width="${splitX}" height="${H}" fill="rgba(255,255,255,.02)"/>`:``}
      <path d="${pathD}" fill="none" stroke="${kleur}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
      ${gustStippen}
      ${stippen}
    </svg>
    <div id="${tooltipId}" style="display:none;margin-top:4px;background:var(--surface2);border-radius:8px;padding:7px 12px;font-family:var(--mono);font-size:calc(12px*var(--fz))"></div>
    <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:calc(9px*var(--fz));color:var(--muted);margin-top:2px">
      <span>${dagHours[0]?.time.slice(11,16)}</span>
      <span style="color:${kleur}">${Math.round(vmin)}–${Math.round(vmax)} ${unit}</span>
      <span>${dagHours[dagHours.length-1]?.time.slice(11,16)}</span>
    </div>
  </div>`;
}

function getSunriseSunset(dateStr, lat){
  const d=new Date(dateStr+'T12:00:00Z');
  const doy=Math.floor((d-new Date(Date.UTC(d.getUTCFullYear(),0,0)))/(864e5));
  const phi=lat*Math.PI/180;
  const delta=0.409*Math.sin(2*Math.PI/365*doy-1.39);
  const cosH0=-Math.tan(phi)*Math.tan(delta);
  if(cosH0<=-1)return{rise:0,set:24};  // middernachtzon
  if(cosH0>=1)return{rise:12,set:12};  // poolnacht
  const H0=Math.acos(cosH0)*12/Math.PI;
  return{rise:12-H0, set:12+H0};
}
function isHourDay(timeStr, lat){
  const date=timeStr.slice(0,10);
  const hour=parseInt(timeStr.slice(11,13))+parseInt(timeStr.slice(14,16)||'0')/60;
  const {rise,set}=getSunriseSunset(date, lat);
  return hour>=rise&&hour<set?1:0;
}

function renderRisk(){
  const fh=S.data.futureHours, d0=S.data.days[0];
  const totalP50=r1(fh.reduce((s,h)=>s+(h.precip||0),0));
  const maxP10mm=fh.length?Math.max(...fh.map(h=>h.p10mm??0)):0;
  const peakHour=fh.find(h=>(h.p10mm??0)===maxP10mm)?.time.slice(11,16)||'—';
  const maxChance=fh.length?Math.max(...fh.map(h=>h.pChance??0)):0;
  const peakChanceHour=fh.find(h=>(h.pChance??0)===maxChance)?.time.slice(11,16)||'—';
  const spread=r1((d0?.precipP90??0)-(d0?.precipP10??0));
  document.getElementById('riskGrid').innerHTML=[
    {title:'Max. neerslagkans (24u)',val:maxChance+'%',sub:`piek om ${peakChanceHour}`,color:'var(--accent)'},
    {title:'Kans op piekbui ≥ 10 mm',val:maxP10mm+'%',sub:`hoogste uur om ${peakHour}`,color:maxP10mm>=20?'var(--red)':'var(--amber)'},
    {title:'Verwachte neerslag (P50)',val:totalP50+' mm',sub:'HARMONIE mediaan · 24u',color:'var(--green)'},
    {title:'Dagspanning (P10–P90)',val:spread+' mm',sub:`${d0?.precipP10??0}–${d0?.precipP90??0} mm vandaag`,color:'#a78bfa'},  ].map(r=>`<div class="risk-card"><div class="risk-card-title">${r.title}</div><div class="risk-card-val" style="color:${r.color}">${r.val}</div><div class="risk-card-sub">${r.sub}</div></div>`).join('');
}

/* ── Eenheden conversie ────────────────────────────────────────── */
// Temperatuur: input altijd °C (integer of null)
function fmtTemp(c){
  if(c==null||c==='—')return'—';
  const v=Number(c);
  if(PREFS.tempUnit==='F')return Math.round(v*9/5+32)+'°F';
  if(PREFS.tempUnit==='K')return Math.round(v+273.15)+' K';
  return Math.round(v)+'°C';
}
function fmtTempShort(c){
  // Gebruik ° zonder eenheidsletter voor compacte weergave
  if(c==null||c==='—')return'—';
  const v=Number(c);
  if(PREFS.tempUnit==='F')return Math.round(v*9/5+32)+'°';
  if(PREFS.tempUnit==='K')return Math.round(v+273.15)+'';
  return Math.round(v)+'°';
}
function tempUnit(){
  if(PREFS.tempUnit==='F')return '°F';
  if(PREFS.tempUnit==='K')return 'K';
  return '°C';
}
// Numerieke conversie (zonder eenheidslabel) voor grafieken/assen
function convTempVal(c){
  if(c==null)return null;
  const v=Number(c);
  if(PREFS.tempUnit==='F')return Math.round(v*9/5+32);
  if(PREFS.tempUnit==='K')return Math.round(v+273.15);
  return Math.round(v);
}
function convWindVal(kmh){
  if(kmh==null)return null;
  const v=Number(kmh);
  if(PREFS.windUnit==='ms')return Math.round(v/3.6);
  if(PREFS.windUnit==='kn')return Math.round(v*0.54);
  if(PREFS.windUnit==='bft'){const bs=[0,1,6,12,20,29,39,50,62,75,89,103,118];const b=bs.findIndex(t=>v<t)-1;return b<0?12:Math.max(0,b);}
  return Math.round(v);
}

// Wind: input altijd km/u (integer of null)
function fmtWind(kmh){
  if(kmh==null||kmh==='—')return'—';
  const v=Number(kmh);
  if(PREFS.windUnit==='ms')return Math.round(v/3.6)+' m/s';
  if(PREFS.windUnit==='kn')return Math.round(v*0.5400)+' kn';
  if(PREFS.windUnit==='bft'){
    const bs=[0,1,6,12,20,29,39,50,62,75,89,103,118];
    const b=bs.findIndex(t=>v<t)-1;
    return 'Bft '+(b<0?12:Math.max(0,b));
  }
  return Math.round(v)+' km/u';
}
function windUnit(){
  if(PREFS.windUnit==='ms')return 'm/s';
  if(PREFS.windUnit==='kn')return 'kn';
  if(PREFS.windUnit==='bft')return 'Bft';
  return 'km/u';
}
// Druk: input altijd hPa
function fmtPres(hpa){
  if(hpa==null||hpa==='—')return'—';
  const v=Number(hpa);
  if(PREFS.presUnit==='mbar')return Math.round(v)+' mbar';
  if(PREFS.presUnit==='inHg')return(v*0.02953).toFixed(2)+' inHg';
  return Math.round(v)+' hPa';
}

        font-family:var(--mono);font-size:calc(12px*var(--fz));cursor:pointer;white-space:nowrap;
        transition:all .15s;-webkit-tap-highlight-color:transparent"
      onmouseover="this.style.borderColor='var(--accent2)'" onmouseout="this.style.borderColor='${active?'var(--accent)':'var(--border2)'}'">
      ${f.name.split(',')[0]}
    </button>`;
  }).join('');
}
function loadFav(i){
  const f=PREFS.favs[i];
  if(!f)return;
  S.lat=f.lat;S.lon=f.lon;S.city=f.name;
  document.getElementById('locInput').value=f.name;
  showLoad();run().catch(e=>showErr(e.message));
}

/* ── Settings modal openen/sluiten ────────────────────────────── */
function openSettings(){
  buildSettingsModal();
  const el=document.getElementById('settingsOverlay');
  el.style.display='flex';
  el.style.alignItems='flex-end';
  el.style.justifyContent='center';
  document.body.style.overflow='hidden';
}
function closeSettings(){
  document.getElementById('settingsOverlay').style.display='none';
  document.body.style.overflow='';
}

/* ── Settings modal bouwen ────────────────────────────────────── */
function buildSettingsModal(){
  const L=LANG[PREFS.lang]||LANG.nl;

  /* helper: segmented control */
  function seg(options,current,onclickFn){
    return`<div style="display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;flex-wrap:wrap">
      ${options.map(([val,label])=>`<button onclick="${onclickFn}('${val}')" style="flex:1;min-width:0;padding:7px 8px;border-radius:7px;border:${current===val?'1px solid var(--border2)':'none'};background:${current===val?'var(--bg2)':'transparent'};color:${current===val?'var(--text)':'var(--muted)'};font-family:var(--mono);font-size:calc(12px*var(--fz));cursor:pointer;white-space:nowrap;font-weight:${current===val?'700':'400'}">${label}</button>`).join('')}
    </div>`;
  }

  /* helpers for section headers and rows */
  function sectionHead(label){
    return`<div style="font-family:var(--mono);font-size:calc(10px*var(--fz));font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;padding:16px 0 6px">${label}</div>`;
  }
  function row(label,control){
    return`<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-family:var(--sans);font-size:calc(14px*var(--fz));color:var(--text);flex-shrink:0">${label}</span>
      <div style="flex:1;max-width:240px">${control}</div>
    </div>`;
  }

  /* favorieten lijst */
  const favs=PREFS.favs||[];
  const favsHtml=favs.length
    ?favs.map((f,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
        <button onclick="closeSettings();loadFav(${i})" style="flex:1;text-align:left;background:none;border:none;color:var(--accent);font-family:var(--mono);font-size:calc(13px*var(--fz));cursor:pointer;padding:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name.split(',').slice(0,2).join(',')}</button>
        <button onclick="deleteFav(${i})" style="background:none;border:none;color:var(--muted);font-size:calc(18px*var(--fz));cursor:pointer;line-height:1;flex-shrink:0">×</button>
      </div>`).join('')
    :`<div style="font-family:var(--mono);font-size:calc(13px*var(--fz));color:var(--muted);padding:10px 0">${L.noFav}</div>`;

  const canAdd=S.lat&&S.lon&&S.city&&!favs.some(f=>f.name===S.city);

  document.getElementById('settingsBody').innerHTML=`
    ${sectionHead(L.theme)}
    ${row(L.theme, seg([['dark',L.dark],['light',L.light]],PREFS.theme,'setPrefTheme'))}

    ${sectionHead(L.lang)}
    ${row(L.lang, seg([['nl','NL'],['en','EN'],['de','DE'],['fr','FR'],['es','ES']],PREFS.lang,'setPrefLang'))}

    ${sectionHead(L.fontSize)}
    ${row(L.fontSize, seg([['sm',L.small],['md',L.medium],['lg',L.large]],PREFS.fontSize,'setPrefFontSize'))}

    ${sectionHead(L.units)}
    ${row(L.temp, seg([['C','°C'],['F','°F'],['K','K']],PREFS.tempUnit,'setPrefTempUnit'))}
    ${row(L.wind, seg([['kmh','km/u'],['ms','m/s'],['kn','kn'],['bft','Bft']],PREFS.windUnit,'setPrefWindUnit'))}
    ${row(L.pres, seg([['hPa','hPa'],['mbar','mbar'],['inHg','inHg']],PREFS.presUnit,'setPrefPresUnit'))}

    ${sectionHead(L.favs)}
    ${favsHtml}
    ${canAdd?`<button onclick="addCurrentFav()" style="margin-top:10px;width:100%;padding:10px;border-radius:10px;border:1px dashed var(--border2);background:var(--surface);color:var(--accent);font-family:var(--sans);font-size:calc(13px*var(--fz));cursor:pointer">+ ${L.addFav}</button>`:''}
  `;
}

/* ── Setter functies (aangeroepen vanuit inline onclick) ─────── */
function setPrefTheme(v){PREFS.theme=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefLang(v){PREFS.lang=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefFontSize(v){PREFS.fontSize=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefTempUnit(v){PREFS.tempUnit=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefWindUnit(v){PREFS.windUnit=v;savePrefs();applyPrefs();buildSettingsModal();}
function setPrefPresUnit(v){PREFS.presUnit=v;savePrefs();applyPrefs();buildSettingsModal();}

function addCurrentFav(){
  if(!S.lat||!S.lon||!S.city)return;
  PREFS.favs=PREFS.favs||[];
  if(!PREFS.favs.some(f=>f.name===S.city)){
    PREFS.favs.push({name:S.city,lat:S.lat,lon:S.lon});
    savePrefs();applyPrefs();buildSettingsModal();
  }
}
function deleteFav(i){
  PREFS.favs.splice(i,1);
  savePrefs();applyPrefs();buildSettingsModal();
}
</script>

<!-- ══ Settings overlay ═════════════════════════════════════════════ -->
<div id="settingsOverlay" style="display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeSettings()">
  <div style="background:var(--bg2);border:1px solid var(--border2);border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:90dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom,0px)">
    <!-- header -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
      <span style="font-family:var(--sans);font-size:calc(17px*var(--fz));font-weight:700;color:var(--text)" id="settingsTitle">Instellingen</span>
      <button onclick="closeSettings()" style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:calc(16px*var(--fz));cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">✕</button>
    </div>
    <!-- body -->
    <div id="settingsBody" style="overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 24px;flex:1"></div>
  </div>
</div>
</body>
</html>
